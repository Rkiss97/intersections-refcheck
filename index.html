<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Reference Checker / Intersections</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --cream:#f0ece4;
  --cream-light:#f7f4ee;
  --cream-dark:#e1ddd3;
  --wine:#6b0f1a;
  --wine-deep:#4a0a12;
  --wine-light:#8c3040;
  --wine-faint:rgba(107,15,26,0.06);
  --wine-border:rgba(107,15,26,0.12);
  --brown:#7a6555;
  --brown-light:#a09080;
  --brown-faint:rgba(122,101,85,0.08);
  --ink:#2c2420;
  --ok:#3a7040;
  --ok-bg:#eef5ea;
  --ok-border:#b5d4a8;
  --warn:#8a6510;
  --warn-bg:#f5efd8;
  --warn-border:#d4c48a;
  --err:#982020;
  --err-bg:#f5e0e0;
  --err-border:#d4a0a0;
  --radius:6px;
  --shadow:0 1px 4px rgba(60,40,20,0.07);
}

body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  font-weight:400;
  font-size:15px;
  color:var(--ink);
  background:var(--cream);
  line-height:1.6;
  min-height:100vh;
}

/* Header */
.header{
  background:var(--cream-dark);
  border-bottom:2px solid var(--wine);
  padding:0 48px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  height:80px;
  position:sticky;
  top:0;
  z-index:100;
}

.header-left{
  display:flex;
  align-items:center;
  gap:24px;
}

.header-left img{
  height:56px;
  width:auto;
}

.header-left .sep{
  width:1px;
  height:36px;
  background:var(--wine-border);
}

.header-left .title{
  font-size:17px;
  font-weight:300;
  color:var(--wine);
  letter-spacing:0.3px;
}

.header-right{display:flex;gap:8px;align-items:center;}
.header-right .info{font-size:12px;color:var(--brown-light);font-weight:300;max-width:340px;text-align:right;line-height:1.45;}

/* Layout */
.wrap{
  max-width:1000px;
  margin:0 auto;
  padding:36px 48px;
  display:flex;
  flex-direction:column;
  gap:24px;
}

/* Cards */
.card{
  background:var(--cream-light);
  border:1px solid var(--wine-border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
}

.card-h{
  padding:14px 24px;
  border-bottom:1px solid var(--wine-border);
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.card-h .label{
  font-size:13px;
  font-weight:500;
  color:var(--wine);
  text-transform:uppercase;
  letter-spacing:0.4px;
}

.card-b{padding:24px;}

/* Buttons */
.btn{
  padding:8px 16px;
  border-radius:5px;
  font-size:13px;
  font-weight:400;
  font-family:inherit;
  cursor:pointer;
  border:1px solid var(--wine-border);
  background:var(--cream-light);
  color:var(--brown);
  transition:all .15s;
  white-space:nowrap;
}
.btn:hover{background:var(--cream-dark);color:var(--ink);}
.btn.active{background:var(--wine);color:#fff;border-color:var(--wine);}

.btn-go{
  background:var(--wine);
  color:#fff;
  border-color:var(--wine);
  font-weight:500;
  padding:9px 24px;
  font-size:14px;
}
.btn-go:hover{background:var(--wine-deep);}
.btn-go:disabled{opacity:.35;cursor:not-allowed;}

/* Textarea */
textarea.ri{
  width:100%;
  min-height:260px;
  padding:20px;
  border:1px solid var(--wine-border);
  border-radius:5px;
  font-family:'SF Mono','JetBrains Mono','Fira Code','Consolas',monospace;
  font-size:13.5px;
  font-weight:400;
  line-height:1.85;
  resize:vertical;
  background:var(--cream);
  color:var(--ink);
}
textarea.ri:focus{outline:none;border-color:var(--wine-light);background:var(--cream-light);}
textarea.ri::placeholder{color:var(--brown-light);font-family:'Inter',sans-serif;font-weight:300;font-size:14px;}

.card-foot{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 24px;
  border-top:1px solid var(--wine-border);
}
.card-foot .hint{font-size:12px;color:var(--brown-light);}

/* Progress */
.prog{display:none;}
.prog.on{display:block;}

.ptrack{height:3px;background:var(--cream-dark);border-radius:2px;overflow:hidden;margin-bottom:14px;}
.pfill{height:100%;background:var(--wine);border-radius:2px;transition:width .3s;}

.pstat{font-size:14px;color:var(--brown);display:flex;align-items:center;gap:10px;}

.dot{width:14px;height:14px;border:2px solid var(--cream-dark);border-top-color:var(--wine);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0;}
@keyframes sp{to{transform:rotate(360deg)}}

.plive{
  margin-top:16px;
  overflow-y:visible;
  font-size:13px;
  line-height:1.7;
  color:var(--brown);
}
.plive-item{
  padding:3px 0;
  display:flex;
  gap:8px;
  align-items:baseline;
}
.plive-item .icon{flex-shrink:0;width:18px;text-align:center;}
.plive-item .text{color:var(--ink);}
.plive-item.pending .text{color:var(--brown-light);}

/* Results */
.res{display:none;}
.res.on{display:block;}

.srow{display:flex;gap:12px;padding:16px 24px;border-bottom:1px solid var(--wine-border);flex-wrap:wrap;}
.pill{
  display:flex;align-items:center;gap:7px;
  padding:7px 16px;border-radius:5px;
  font-size:14px;font-weight:400;
}
.pill .n{font-size:18px;font-weight:500;}
.pill.p-all{background:var(--wine-faint);color:var(--wine);}
.pill.p-ok{background:var(--ok-bg);color:var(--ok);}
.pill.p-warn{background:var(--warn-bg);color:var(--warn);}
.pill.p-err{background:var(--err-bg);color:var(--err);}

.rbody{padding:24px;}

.entry{
  padding:18px 20px;
  margin-bottom:12px;
  border-radius:5px;
  border-left:3px solid;
  font-size:14px;
  line-height:1.75;
}
.entry.e-ok{background:var(--ok-bg);border-color:var(--ok);}
.entry.e-warn{background:var(--warn-bg);border-color:var(--warn);}
.entry.e-err{background:var(--err-bg);border-color:var(--err);}

.entry .ref{
  font-family:'SF Mono','JetBrains Mono','Consolas',monospace;
  font-size:13px;
  word-break:break-word;
}
.entry .ann{
  margin-top:12px;
  padding-top:12px;
  border-top:1px solid rgba(0,0,0,.06);
  font-size:13px;
  color:var(--brown);
}
.entry .ann-line{margin-bottom:3px;}
.entry .ann-line.match{color:var(--ok);}
.entry .ann-line.mismatch{color:var(--err);}
.entry .ann-line.source{color:var(--brown-light);font-style:italic;}
.entry .found-record{
  margin-top:8px;padding:10px 14px;
  background:rgba(0,0,0,.03);border-radius:4px;
  font-size:12px;line-height:1.65;
}
.entry a{color:var(--wine);text-decoration:none;}
.entry a:hover{text-decoration:underline;}

/* Filters */
.flts{display:flex;gap:4px;}
.fp{
  padding:5px 11px;border-radius:4px;font-size:12px;font-weight:400;
  cursor:pointer;border:1px solid transparent;background:none;
  color:var(--brown-light);font-family:inherit;transition:all .15s;
}
.fp:hover{color:var(--brown);background:var(--cream-dark);}
.fp.on{background:var(--wine-faint);color:var(--wine);border-color:var(--wine-border);}

/* Raw box */
.raw-wrap{
  display:none;margin:0 24px 24px;
}
.raw-wrap.on{display:block;}
.raw-toolbar{
  display:flex;justify-content:flex-end;margin-bottom:8px;padding-top:4px;
}
.raw-copy{
  padding:5px 16px;
  background:var(--wine);color:#fff;border:none;border-radius:4px;
  font-size:12px;cursor:pointer;font-family:Inter,sans-serif;
  letter-spacing:0.3px;
}
.raw-copy:hover{background:var(--wine-deep);}
.raw{
  padding:20px;
  background:var(--cream);border-radius:8px;border:1px solid var(--cream-dark);
  font-family:'SF Mono','Menlo','Consolas',monospace;font-size:12.5px;
  white-space:pre-wrap;word-break:break-word;line-height:1.8;
  color:var(--brown);
}

/* Toast */
.toast{
  position:fixed;bottom:24px;right:24px;padding:10px 20px;
  background:var(--wine-deep);color:#fff;border-radius:6px;
  font-size:14px;font-weight:400;
  transform:translateY(80px);opacity:0;transition:all .25s;z-index:1000;
}
.toast.on{transform:translateY(0);opacity:1;}

@media(max-width:768px){
  .header,.wrap{padding-left:20px;padding-right:20px;}
  .srow{flex-direction:column;gap:8px;}
  .header{height:60px;}
  .header-left img{height:36px;}
  .header-right .info{display:none;}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <img src="https://intersections.tk.mta.hu/public/journals/1/pageHeaderLogoImage_en_US.svg" alt="Intersections">
    <div class="sep"></div>
    <div class="title">Reference Checker</div>
  </div>
  <div class="header-right">
    <div class="info">Verifies references against CrossRef, OpenAlex, Semantic Scholar, Open Library, Google Books and arXiv.</div>
  </div>
</div>

<div class="wrap">

  <!-- Input card -->
  <div class="card">
    <div class="card-h">
      <span class="label">Paste reference list</span>
      <div style="display:flex;gap:6px;">
        <button class="btn" onclick="clr()">Clear</button>
      </div>
    </div>
    <div class="card-b">
      <textarea class="ri" id="refIn" placeholder="Paste your reference list here (APA, Harvard, Chicago, or any standard academic format)..." oninput="uc()"></textarea>
    </div>
    <div class="card-foot">
      <span class="hint" id="hint"></span>
      <button class="btn btn-go" id="goBtn" onclick="go()" disabled>Check References</button>
    </div>
  </div>

  <!-- Progress card -->
  <div class="card prog" id="progCard">
    <div class="card-h"><span class="label" id="progLabel">Checking references...</span></div>
    <div class="card-b">
      <div class="ptrack"><div class="pfill" id="pbar" style="width:0%"></div></div>
      <div class="pstat"><div class="dot"></div><span id="ptxt">Starting...</span></div>
      <div class="plive" id="plive"></div>
    </div>
  </div>

  <!-- Results card -->
  <div class="card res" id="resCard">
    <div class="card-h">
      <span class="label">Results</span>
      <div style="display:flex;gap:6px;align-items:center;">
        <div class="flts">
          <button class="fp on" onclick="filt('all',this)">All</button>
          <button class="fp" onclick="filt('ok',this)">Verified</button>
          <button class="fp" onclick="filt('warn',this)">Uncertain</button>
          <button class="fp" onclick="filt('error',this)">Errors</button>
        </div>
        <button class="btn" id="rawBtn" onclick="toggleRaw()">Raw</button>
        <button class="btn" onclick="exp()">Export</button>
      </div>
    </div>
    <div class="srow" id="sumRow"></div>
    <div class="rbody" id="resBody"></div>
    <div class="raw-wrap" id="rawWrap">
      <div class="raw-toolbar"><button class="raw-copy" onclick="copyRaw()">Copy</button></div>
      <div class="raw" id="rawBox"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================
   CONFIGURATION
   ============================================ */
const MAILTO = 'intersections@tk.mta.hu';
const CROSSREF_API = 'https://api.crossref.org';
const OPENALEX_API = 'https://api.openalex.org';
const S2_API = 'https://api.semanticscholar.org/graph/v1';
const MAX_CONCURRENT = 3;
const REQ_DELAY = 350; // ms between requests to be polite

/* ============================================
   REFERENCE PARSING
   ============================================ */

// Lowercase name particles that can begin an author surname (Dutch/German/French/Italian/Portuguese/Spanish)
// Used so references like "van Leeuwen, T. (2008)..." or "de Graaf, J. (2019)..." are recognised
// even though they start with a lowercase letter.
const LOWERCASE_PARTICLES = 'van|von|de|di|la|le|der|den|des|du|da|do|del|della|dello|ter|ten|af|av|zu';
// Matches the start of a reference beginning with either a capital letter OR a lowercase particle + space + capital
const REF_START_RE = new RegExp('^(?:[A-Z\\u00C0-\\u024F]|(?:' + LOWERCASE_PARTICLES + ')\\s+[A-Z\\u00C0-\\u024F])');

// OSCOLA citation style: "Surname Initials, ..." — e.g. "Becker GS," or "Pontell HN, Black WK and Geis G,"
// Authors use surname followed by unpunctuated initials (unlike APA's "Becker, G.S.")
// Each author is: (optional particle — case-insensitive) Surname (may be hyphenated) + space + 1-4 uppercase initials
// followed by an optional generational suffix (Jr / Sr / II / III / IV).
// Authors are separated by ", " or " and ". The whole author list ends with a terminal ", " before the title.
// OSCOLA often capitalizes particles ("De Nicola F") so we accept either case here.
const OSCOLA_PARTICLES = LOWERCASE_PARTICLES.split('|')
  .map(p => '[' + p.charAt(0).toUpperCase() + p.charAt(0) + ']' + p.slice(1))
  .join('|');
// Surname body accepts internal capitals (McBarnet, MacDonald, O'Brien). Using
// [A-Z][A-Za-z]+ rather than [A-Z][a-z]+ is critical: "McCrary" and "McBarnet" have
// a capital mid-word and would otherwise fail to match as a CORE unit.
const OSCOLA_AUTHOR_CORE = '(?:(?:' + OSCOLA_PARTICLES + ')\\s+)?[A-Z\\u00C0-\\u024F][A-Za-z\\u00C0-\\u024F]+(?:[-\'\\u2019][A-Z\\u00C0-\\u024F][A-Za-z\\u00C0-\\u024F]+)?\\s+[A-Z\\u00C0-\\u024F]{1,4}(?:\\s+(?:Jr|Sr|II|III|IV))?';
// Allow trailing "and others" / "et al" / "et al." — common OSCOLA author-list terminators
const OSCOLA_AUTHOR_LIST = OSCOLA_AUTHOR_CORE + '(?:(?:,\\s+|\\s+and\\s+)' + OSCOLA_AUTHOR_CORE + ')*(?:\\s+and\\s+others|\\s+et\\s+al\\.?)?';
const OSCOLA_AUTHOR_RE = new RegExp('^' + OSCOLA_AUTHOR_LIST + ',\\s');

// OSCOLA org-author form: "OrgName, '...'" — an organization name (1-6 capitalized words,
// optionally including small-caps acronyms or connectives) followed by a comma and then
// a single-quoted article title. We REQUIRE the single-quoted title because an unquoted
// title after a comma is ambiguous with APA author-initial patterns like "Smith, J.".
// Examples: "Europol, '...'", "FATF, '...'", "DOJ, '...'", "Transparency International, '...'"
// NOTE: unquoted book form "Org, Title (Publisher Year)" is handled via a separate
// book-title extractor below (it doesn't need a start-detector since split-by-line catches it).
// Word body accepts optional trailing 's (US Attorney's, People's) and internal caps (MacBank).
const OSCOLA_ORG_WORD = '(?:[A-Z\\u00C0-\\u024F][A-Za-z\\u00C0-\\u024F]+(?:[\'\\u2019]s)?|[A-Z]{2,}(?:\\.[A-Z]+)*)';
// Org core: main name followed by an optional abbreviation paren like "(IC3)", "(FATF)",
// "(FBI)" so names such as "FBI Internet Crime Complaint Center (IC3)" are recognised.
// The abbrev accepts capitals + digits (IC3) and allows up to 6 slots in the main part.
const OSCOLA_ORG_CORE = OSCOLA_ORG_WORD +
  '(?:\\s+(?:' + OSCOLA_ORG_WORD + '|and|&|of|for|the|on|to)){0,6}' +
  '(?:\\s*\\([A-Z][A-Z0-9]+\\))?';
// Subunit: optional ", SDNY" or ", Office of Public Affairs" after the main org core
const OSCOLA_ORG_SUB = '(?:,\\s+' + OSCOLA_ORG_WORD + '(?:\\s+(?:' + OSCOLA_ORG_WORD + '|and|&|of|for|the|on|to)){0,4})?';
const OSCOLA_ORG_RE = new RegExp('^' + OSCOLA_ORG_CORE + OSCOLA_ORG_SUB + ',\\s+[\'\\u2018\\u2019]');

// Check if a chunk looks like an OSCOLA reference start (person or organization)
function looksLikeOscolaEntry(text) {
  if (!text || text.length < 25) return false;
  // Must have a year somewhere in first 500 chars — OSCOLA always cites the year
  if (!/\b(?:1[89]|20)\d{2}\b/.test(text.substring(0, 500))) return false;
  // Reject common non-author sentence starters
  if (/^(The|This|That|These|Those|There|When|Where|While|Which|What|From|With|Without|After|Before|Since|In)\b/i.test(text)) return false;
  if (OSCOLA_AUTHOR_RE.test(text)) return true;
  // Org form — requires title in single quotes OR unquoted title followed by "(" (book publisher paren)
  if (OSCOLA_ORG_RE.test(text)) {
    // Must have either a single-quoted title or a "(Publisher Year)" pattern to distinguish from APA-ish
    if (/['\u2018\u2019]/.test(text.substring(0, 200))) return true;
    if (/\([^)]*\b(?:1[89]|20)\d{2}\)/.test(text.substring(0, 400))) return true;
  }
  // Org form with an UNQUOTED book/report title, e.g.
  //   "FBI Internet Crime Complaint Center (IC3), Internet Crime Report 2024 (23 April 2025)"
  //   "Chainalysis, 2026 Crypto Crime Report (13 January 2026)"
  //   "TRM Labs, 2026 Crypto Crime Report (28 January 2026)"
  // We require a publisher/date paren containing a year somewhere later in the chunk,
  // which distinguishes it from plain prose or APA continuations.
  const oscolaOrgBookStart = new RegExp(
    '^' + OSCOLA_ORG_CORE + OSCOLA_ORG_SUB + ',\\s+(?:[A-Z\\u00C0-\\u024F][A-Za-z\\u00C0-\\u024F]|\\d{2})'
  );
  if (oscolaOrgBookStart.test(text)) {
    if (/\([^)]*\b(?:1[89]|20)\d{2}[a-z]?\)/.test(text.substring(0, 400))) return true;
  }
  return false;
}

// Check if a text chunk looks like the start of a new reference
// Must start with a capital letter, contain (Year) near the beginning,
// and NOT have sentence boundaries between the start and the year
function looksLikeNewRef(chunk) {
  if (!chunk || chunk.length < 10) return false;
  // DOI/URL lines are NOT new references — they're continuations
  if (/^\s*(?:DOI\s*:|https?:\/\/|doi[:.]\s*10\.)/i.test(chunk) || /^\s*10\.\d{4,}\//.test(chunk)) return false;
  // Journal metadata lines (e.g. "Journal Name, 49(5), 605–628.") are continuations, not new refs
  // Only match if vol/issue pattern is early (first 80 chars) AND there's no (Year) near the start
  // — full references like "McCourt, D. M. (2011). Title. Journal, 37(4), 1705" have (Year) early
  if (/^\s*[A-Z][a-z]/.test(chunk) && /\d+\s*\(\d+\)\s*[,:]\s*\d/.test(chunk.substring(0, 80)) && !/\(\d{4}[a-z]?\)/.test(chunk.substring(0, 60))) return false;
  // Must start with a capital letter, or a lowercase particle + capital (e.g. "van Leeuwen")
  if (!REF_START_RE.test(chunk)) return false;
  // Reject chunks starting with a single initial like "K.," or "B. " — continuation of author list
  // Real references start with multi-letter surnames (e.g. "Kovács,"), not lone initials
  if (/^[A-Z\u00C0-\u024F][.,]/.test(chunk)) return false;
  // Must NOT start with common non-author words
  if (/^(In|The|A|An|And|But|Or|For|With|From|This|That|These|Those|Trans|Press|pp)\b/i.test(chunk)) return false;
  // Find the first (Year) in the chunk — either (2001) or . 2001 or similar
  const yearMatch = chunk.match(/[\(\.]\s*\d{4}[a-z]?\)?/);
  if (!yearMatch) return false;
  // The text before the year — should be author names, not sentences
  const textBeforeYear = chunk.substring(0, yearMatch.index).trim();
  // Author list should be <120 chars (even with many co-authors)
  if (textBeforeYear.length > 120) return false;
  // Reject if text before year contains journal/volume metadata — this is a citation continuation
  // e.g. "History and Theory 41, no 2 (2022)" or "Philological Bulletin, vol. 3, no. 1 (2024)"
  if (/\b(vol|no|issue|pp)\b\.?\s*\d/i.test(textBeforeYear)) return false;
  // Also reject bare volume/issue patterns like "Series 2:" or "41, no."
  if (/\d+,\s*no\b/i.test(textBeforeYear)) return false;
  // Should NOT contain sentence boundaries: period + space + word >=3 chars
  // (initials like "D. " or "M. " are OK — they're <=2 chars)
  if (/\.\s+[A-Za-z\u00C0-\u024F]{3,}/.test(textBeforeYear)) return false;
  // Closing parenthesis before a word >=3 chars also indicates a sentence
  if (/\)\.\s+[A-Za-z\u00C0-\u024F]{3,}/.test(textBeforeYear)) return false;
  // Author name before year must be at least 3 chars (shortest surname)
  // Single letters like "J" or "A" are initials, not reference starts
  if (textBeforeYear.length < 3) return false;
  // Must contain at least one word with 3+ letters (a real surname or org name)
  // Rejects lone initials like "S. J" or "J.F" which are split author fragments
  if (!/[A-Za-z\u00C0-\u024F]{3,}/.test(textBeforeYear)) return false;
  // Organizational authors are short (<50 chars). If textBeforeYear is long
  // and has no comma near the start, it's probably a publisher/title, not an author
  const hasAuthorComma = /^[^,]{1,30},/.test(textBeforeYear);
  if (!hasAuthorComma && textBeforeYear.length > 50) return false;
  return true;
}

function splitRefs(txt) {
  // Strategy 0: Bullet-point references (e.g. "• Author1... • Author2...")
  // Common when pasting from Word/PDF bulleted lists
  // Also handles other bullet characters: ◦ ▪ ▸ ‣ ⁃ – —
  // Bullet-split items are explicit separators — do NOT merge them back together
  const bulletCount = (txt.match(/(?:^|\n)\s*[\u2022\u25E6\u25AA\u25B8\u2023\u2043]\s/g) || []).length;
  if (bulletCount >= 3) {
    const bulletRefs = txt.split(/(?:^|\n)\s*[\u2022\u25E6\u25AA\u25B8\u2023\u2043]\s+/)
      .map(b => b.replace(/\s*\n\s*/g, ' ').trim())
      .filter(r => r.length > 15);
    if (bulletRefs.length >= 3) return bulletRefs;
  }
  // Also handle inline bullets (no line breaks): "text • text • text"
  const inlineBulletCount = (txt.match(/\s[\u2022\u25E6\u25AA\u25B8\u2023\u2043]\s/g) || []).length;
  if (inlineBulletCount >= 3) {
    const bulletRefs = txt.split(/\s*[\u2022\u25E6\u25AA\u25B8\u2023\u2043]\s+/)
      .map(b => b.replace(/\s*\n\s*/g, ' ').trim())
      .filter(r => r.length > 15);
    if (bulletRefs.length >= 3) return bulletRefs;
  }

  // Strategy 1: Numbered references (e.g. "1. Author... 2. Author...")
  // Only match small numbers (1-999) to avoid matching years like "2022. Vol..."
  // The number must be at the start of a line, after a tab, or at text start
  // NOTE: use \s* (not \s+) because PDF/Word extraction often loses the space between
  // a double-digit number and the following surname (e.g. "10.Lozo O." instead of "10. Lozo O.")
  const numberedRe = /(?:^|\n)\s*(\d{1,3})\.\s*[A-Z\u00C0-\u024F][a-zA-Z\u00C0-\u024F]/g;
  const numberedMatches = [...txt.matchAll(numberedRe)];
  if (numberedMatches.length >= 2) {
    const nums = numberedMatches.map(m => parseInt(m[1]));
    // Require: starts at 1 (or 0) and roughly sequential
    const startsLow = nums[0] <= 1;
    const isSequential = nums.every((n, i) => i === 0 || (n >= nums[i-1] && n <= nums[i-1] + 2));
    if (startsLow && isSequential && nums.length >= 3) {
      // Once confirmed as numbered list, split on "N. Letter" (upper or lowercase, but NOT digits like "10.15507" DOIs)
      // Require the next char after \s* to be a LETTER (not digit) to avoid matching DOI prefixes
      const parts = txt.split(/(?=(?:^|\n)\s*\d{1,3}\.\s*[A-Za-z\u00C0-\u024F][a-zA-Z\u00C0-\u024F])/);
      const numbered = parts.map(p => p.trim().replace(/^\d{1,3}\.\s*/, '')).filter(r => r.length > 15);
      if (numbered.length >= 2) return numbered; // Numbered refs are already well-split — skip postSplitMerged
    }
  }

  const hasLineBreaks = txt.includes('\n');

  // Strategy 2a: Blank-line splitting
  if (hasLineBreaks && /\n\s*\n/.test(txt)) {
    const blankLineRefs = txt.split(/\n\s*\n/)
      .map(b => b.replace(/\s*\n\s*/g, ' ').trim())
      .filter(r => r.length > 15);
    if (blankLineRefs.length >= 2) {
      // Re-merge fragments that don't look like reference starts
      // (handles PDFs where blank lines appear within multi-line references)
      // Pass 1: short fragments without year (<40 chars) — try prepending to NEXT chunk
      // This fixes cases like "Ball, S." / "J. (2015)..." where the author name was split
      for (let i = blankLineRefs.length - 2; i >= 0; i--) {
        const chunk = blankLineRefs[i + 1];
        const prev = blankLineRefs[i];
        if (prev.length < 40 && !/\(\d{4}/.test(prev) && !looksLikeNewRef(prev)) {
          const combined = prev + ' ' + chunk;
          if (looksLikeNewRef(combined) || !looksLikeNewRef(chunk)) {
            // Prepending makes a valid ref start, or next chunk wasn't a ref start anyway
            blankLineRefs[i + 1] = combined;
            blankLineRefs.splice(i, 1);
          }
        }
      }
      // Pass 2: merge non-reference chunks with previous
      // Also merges when previous entry ends with partial author list
      // (trailing &, & X., , X., or bare comma — indicates split author names)
      const merged = [blankLineRefs[0]];
      for (let i = 1; i < blankLineRefs.length; i++) {
        const chunk = blankLineRefs[i];
        const prevMerged = merged[merged.length - 1];
        // Check if previous entry ends with a partial author list
        const prevEndsPartial = /(&\s*$|&\s+[A-Z]\.\s*$|,\s+[A-Z]\.\s*$)/.test(prevMerged);
        if (prevEndsPartial || !looksLikeNewRef(chunk)) {
          // Merge: either prev is incomplete, or chunk isn't a new reference
          merged[merged.length - 1] += ' ' + chunk;
        } else {
          merged.push(chunk);
        }
      }
      if (merged.length >= 2) return postSplitMerged(merged);
    }
  }

  // Strategy 2b: Line-by-line splitting — PRIMARY strategy when text has line breaks
  if (hasLineBreaks) {
    const lines = txt.split('\n');
    const refs = [];
    let cur = [];
    for (const l of lines) {
      if (l.trim()) {
        const trimmed = l.trim();
        // Use \s* (not \s+) so "10.Lozo" (no space after number) is recognised as numbered too
        const isNumbered = new RegExp('^\\d+\\.\\s*(?:[A-Z\\u00C0-\\u024F]|(?:' + LOWERCASE_PARTICLES + ')\\s+[A-Z\\u00C0-\\u024F])').test(trimmed);
        // Only treat as new ref if previous line looks like a complete reference ending
        const prevLine = cur.length > 0 ? cur[cur.length - 1].trim() : '';
        const prevEndsLikeRef = prevLine === '' ||
          /[.)\]\d]$/.test(prevLine) ||
          /https?:\/\/\S+$/.test(prevLine) ||
          /doi\.org\/\S+$/.test(prevLine);
        const isDOIorURL = /^\s*(?:DOI\s*:|https?:\/\/|doi[:.]\s*10\.)/i.test(trimmed) || /^\s*10\.\d{4,}\//.test(trimmed);
        // Journal metadata continuation: "Journal Name, Vol(Issue), Pages. DOI" — not a new reference
        // Only if vol/issue is early AND no (Year) near start — otherwise it's a full reference
        const isJournalMeta = /^\s*[A-Z][a-z]/.test(trimmed) && /\d+\s*\(\d+\)\s*[,:]\s*\d/.test(trimmed.substring(0, 80)) && !/\(\d{4}[a-z]?\)/.test(trimmed.substring(0, 60));
        // Year detection: accept APA "(2020)" / ", 2020" AND plain-year styles like
        // "Cheriet, M. 2020. Title..." or "...Licence and... 1993. https://..." or "...2019. https://reyestr..."
        // Any 4-digit year (1800-2099) anywhere in the line is fine — combined with REF_START_RE
        // and prevEndsLikeRef, false positives are unlikely.
        const isNewRef = !isDOIorURL && !isJournalMeta && prevEndsLikeRef && REF_START_RE.test(trimmed) && /\b(?:18|19|20)\d{2}\b/.test(l);
        // Numbered entries (e.g. "11. McDonald J.") are always new refs — no need for prevEndsLikeRef
        if (cur.length > 0 && (isNumbered || isNewRef)) {
          refs.push(cur.join(' ').trim());
          cur = [isNumbered ? trimmed.replace(/^\d+\.\s*/, '') : trimmed];
        } else {
          cur.push(isNumbered ? trimmed.replace(/^\d+\.\s*/, '') : trimmed);
        }
      }
    }
    if (cur.length > 0) refs.push(cur.join(' ').trim());
    const lineRefs = refs.filter(r => r.length > 15);
    if (lineRefs.length >= 2) return postSplitMerged(lineRefs);
  }

  // Strategy 3: Inline splitting — ONLY used when text is a single paragraph (no line breaks)
  // Supports APA, Chicago, MLA and other citation styles
  const flat = txt.replace(/\r?\n/g, ' ').replace(/\s+/g, ' ').trim();
  const inlineRefs = splitInlineRefs(flat);
  if (inlineRefs.length >= 2) return inlineRefs;

  return [txt].filter(r => r.trim().length > 15);
}

// Check if text starts with an author-like pattern (for any citation style)
// Less strict than looksLikeNewRef — doesn't require (Year) near the beginning
// "Belyantsev, Aleksei" or "Bogost, Ian." or "McGonigal, Jane"
function looksLikeAuthorStart(text) {
  if (!text || text.length < 20) return false;
  // Surname, Firstname/Initial: "Lastname, F" where F is capital
  // Supports hyphenated names (Levi-Strauss), McX names (McGonigal), and accented chars
  if (/^[A-Z\u00C0-\u024F][a-zA-Z\u00C0-\u024F''\u2019\-]{1,},\s+[A-Z]/.test(text)) {
    // Reject common non-author words that happen to have commas after them
    if (/^(In|The|New|St|Association|Press|University|MIT|Oxford|Cambridge|Moscow|London|Paris|Berlin),/i.test(text)) return false;
    return true;
  }
  // Lowercase particle surname: "van Leeuwen, T." / "de Graaf, J." / "von Neumann, J."
  const particleRe = new RegExp('^(?:' + LOWERCASE_PARTICLES + ')\\s+[A-Z\\u00C0-\\u024F][a-zA-Z\\u00C0-\\u024F\'\'\\u2019\\-]{1,},\\s+[A-Z]');
  if (particleRe.test(text)) return true;
  return false;
}

// Check if text starts with a new reference entry (any citation style)
// Combines APA looksLikeNewRef with broader Chicago/MLA detection
function looksLikeNewEntry(text) {
  // Reject access/retrieval date lines — these belong to the previous reference
  if (/^(?:Accessed|Retrieved|Available|Downloaded|Abgerufen|Zugriff|Letzter\s+Zugriff)\b/i.test(text)) return false;
  // EARLY REJECT: Journal metadata lines like "Scandinavian Journal of History, 49(5), 605–628."
  // Must check BEFORE looksLikeNewRef/looksLikeAuthorStart to prevent any false positives
  // Only reject if vol/issue is early AND no (Year) near start (otherwise it's a full reference)
  if (/^\s*[A-Z][a-z]/.test(text) && /\d+\s*\(\d+\)\s*[,:]\s*\d/.test(text.substring(0, 80)) && !/\(\d{4}[a-z]?\)/.test(text.substring(0, 60))) return false;
  if (looksLikeNewRef(text)) return true;
  if (looksLikeAuthorStart(text)) return true;
  if (looksLikeOscolaEntry(text)) return true;
  // Anonymised/redacted references: "[Publication anonymised]" or "[Author removed]" etc.
  if (/^\[(?:Publication|Author|Reference|Name)\s/i.test(text)) return true;
  // Organization or title start: capitalized word (may end with period) followed by more text
  // Also match Mc/Mac/De/O' prefixed names like McDonald, McLachlan, DeZIM, O'Brien
  if ((/^[A-Z\u00C0-\u024F][a-z\u00C0-\u024F]{2,}[.\s]/.test(text) || /^(?:Mc|Mac|De|Di|Le|La|Van|Von|O')[A-Z]/.test(text)) && text.length >= 30) {
    // Reject journal/volume continuation lines
    // NOTE: "no" is excluded here because "No. NNN" is ambiguous — it can be a document number
    // (e.g. "Resolution of the Cabinet of Ministers of Ukraine No. 340") not a journal issue.
    // Real journal continuations almost always contain vol/issue/pp markers instead.
    if (/\b(vol|issue|pp)\b\.?\s*\d/i.test(text.substring(0, 60))) return false;
    if (/^\d+,?\s*no\b/i.test(text)) return false;
    // Reject "Journal Name, Volume(Issue), Pages" patterns — e.g. "Scandinavian Journal of History, 49(5), 605–628"
    if (/\d+\s*\(\d+\)\s*[,:]\s*\d/.test(text.substring(0, 80))) return false;
    // Reject publisher names — these are endings of references, not starts of new ones
    if (/^(Springer|Routledge|Palgrave|Waxmann|Elsevier|Wiley|Sage|Campus|Beltz|Suhrkamp|transcript|Nomos|Pearson|Jossey|Emerald|Bristol|Oxford|Cambridge|Harvard|Princeton|Stanford|MIT)\b/i.test(text)) return false;
    // Must have a year or "n.d." within first 300 chars
    if (/\b(19|20)\d{2}\b/.test(text.substring(0, 300))) return true;
    if (/\bn\.?\s?d\.?\b/i.test(text.substring(0, 300))) return true;
    // Or has a URL (web source without year)
    if (/https?:\/\//.test(text.substring(0, 500))) return true;
  }
  return false;
}

// Post-processing: split any entry that accidentally merged two references on one line
// Works for APA, Chicago, MLA, and other citation styles
function postSplitMerged(refs) {
  const result = [];
  for (const ref of refs) {
    const positions = [];

    // Method 1: APA-style — find (Year) then look backwards for split point
    const yearRe = /\(\d{4}[a-z]?\)/g;
    let ym;
    while ((ym = yearRe.exec(ref)) !== null) {
      if (ym.index < 20) continue;
      const before = ref.substring(0, ym.index);
      const endRe = new RegExp('(https?:\\/\\/\\S+\\s+|[.)\\]]\\s+)(?:[A-Z\\u00C0-\\u024F]|(?:' + LOWERCASE_PARTICLES + ')\\s+[A-Z\\u00C0-\\u024F])', 'g');
      let best = null;
      let em;
      while ((em = endRe.exec(before)) !== null) {
        const splitAt = em.index + em[1].length;
        const textJustBefore = before.substring(Math.max(0, em.index - 5), em.index + em[1].length);
        if (/[&,]\s+[A-Z]\.\s+$/.test(textJustBefore)) continue;
        const candidateRef = ref.substring(splitAt);
        if (looksLikeNewRef(candidateRef) && splitAt > 30) {
          best = splitAt;
        }
      }
      if (best !== null && !positions.includes(best)) {
        positions.push(best);
      }
    }

    // Method 2: DOI/URL boundary — split after DOI or URL if followed by new author/entry
    // Catches Chicago/MLA refs: "...doi:10.xxx Author, First..." or "...https://url Author, First..."
    const doiUrlEndRe = /(doi[:.]10\.\S+|https?:\/\/\S+)\s+/g;
    let dm;
    while ((dm = doiUrlEndRe.exec(ref)) !== null) {
      const afterIdx = dm.index + dm[0].length;
      if (afterIdx < 30 || afterIdx >= ref.length - 20) continue;
      if (positions.includes(afterIdx)) continue;
      const after = ref.substring(afterIdx);
      if (looksLikeNewEntry(after)) {
        positions.push(afterIdx);
      }
    }

    // Method 3: Book-end pattern — "Publisher, Year." or just "Year." followed by new author
    // Catches: "MIT Press, 2007. Author, First..." or "Moscow: Nauka, 2003. Author..."
    const bookEndRe = /(?:,\s+|\.\s+|\()((?:19|20)\d{2})\)?\.\s+([A-Z\u00C0-\u024F])/g;
    let bm;
    while ((bm = bookEndRe.exec(ref)) !== null) {
      // The new reference starts at the capital letter after "Year. "
      const splitAt = bm.index + bm[0].length - 1; // position of the capital letter
      if (splitAt < 30 || splitAt >= ref.length - 20) continue;
      if (positions.includes(splitAt)) continue;
      // Skip if this is an APA "(Year). Title" pattern — text before year ends with initials/&
      // e.g. "Chen, Y.-W., & Hao, Y. (2020). Czech perceptions..."
      // or "Krivokhizh, S., Soboleva, E., & HSE University. (2023). Strategic..."
      const textBefore = ref.substring(Math.max(0, bm.index - 30), bm.index + 1);
      if (/[A-Z]\.\s*\(?$/.test(textBefore) || /&\s+[A-Z]\.\s*\(?$/.test(textBefore) || /[A-Z]\.-[A-Z]\.\s*,?\s*\(?$/.test(textBefore)) continue;
      // Also skip if year is in parentheses and preceded by typical APA author ending
      const textBeforeClean = ref.substring(Math.max(0, bm.index - 30), bm.index).replace(/\s*$/, '');
      if (bm[0].startsWith('(')) {
        // CRITICAL: only split at APA "(YYYY)." if there was already an earlier (YYYY)
        // in the reference. If this is the FIRST (YYYY) in the whole ref, it's the year
        // of the current reference itself (especially for organization-author refs like
        // "Republic of Kazakhstan. (1995). Constitution of..." or
        // "Bureau of National Statistics... (2025). Official website. https://..."),
        // NOT a split point to a new APA reference.
        const textBeforeAll = ref.substring(0, bm.index);
        if (!/\(\d{4}[a-z]?\)/.test(textBeforeAll)) continue;
        // Check if the broader context before looks like APA authors (has initials like "X." or "X.-X.")
        const broaderBefore = ref.substring(Math.max(0, bm.index - 120), bm.index);
        if (/[A-Z]\.\s*[,&]/.test(broaderBefore) || /[A-Z]\.-[A-Z]\./.test(broaderBefore)) continue;
        // Also skip if text before ends with period+space (common in APA: "University. (2023)")
        if (/\.\s*$/.test(textBeforeClean) && /[A-Z]\.,/.test(broaderBefore)) continue;
        // Skip if preceded by organization abbreviation in parens: "(BIBB). (2020)" or "(DeZIM). (2022)"
        if (/\([A-Za-z]{2,}\)\.\s*$/.test(textBeforeClean)) continue;
      }
      const after = ref.substring(splitAt);
      if (looksLikeNewEntry(after)) {
        positions.push(splitAt);
      }
    }

    // Method 4: Page-range end pattern — "pages. Author, First..." or "pages–pages. Author..."
    const pageEndRe = /\d+[\u2013\u2014-]\d+\.\s+([A-Z\u00C0-\u024F])/g;
    let pm;
    while ((pm = pageEndRe.exec(ref)) !== null) {
      const capMatch = pm[0].match(/\.\s+([A-Z])/);
      const splitAt = pm.index + pm[0].indexOf(capMatch[0]) + capMatch[0].length - 1;
      if (splitAt < 30 || splitAt >= ref.length - 20) continue;
      if (positions.includes(splitAt)) continue;
      const after = ref.substring(splitAt);
      if (looksLikeNewEntry(after)) {
        positions.push(splitAt);
      }
    }

    // Method 5: Closing bracket ] followed by new entry
    // Catches: "...politika] Bankhurst, Adam..." or "...itogi] Haass, Richard..."
    const bracketEndRe = /\]\.?\s+([A-Z\u00C0-\u024F])/g;
    let brm;
    while ((brm = bracketEndRe.exec(ref)) !== null) {
      // Split point is at the captured capital letter
      const splitAt = brm.index + brm[0].length - 1;
      if (splitAt < 30 || splitAt >= ref.length - 20) continue;
      if (positions.includes(splitAt)) continue;
      const after = ref.substring(splitAt);
      // Skip if what follows looks like journal info: "Közgazdasági Szemle [Economic Review], 3(70)..."
      // Check: does the text after ] contain volume/issue pattern within first 80 chars?
      if (/\d+\s*\(\d+\)/.test(after.substring(0, 80))) continue;
      // Skip if the ] closes a bracketed translation that is part of the SAME reference
      // Look back for matching [ — if there's a [ after the last split position, it's an inline bracket
      const textBefore = ref.substring(Math.max(0, positions.length > 0 ? positions[positions.length - 1] : 0), brm.index);
      const lastOpen = textBefore.lastIndexOf('[');
      const lastClose = textBefore.lastIndexOf(']');
      if (lastOpen > lastClose) continue; // This ] closes a [ within the same reference
      if (looksLikeNewEntry(after)) {
        positions.push(splitAt);
      }
    }

    // Sort and deduplicate
    positions.sort((a, b) => a - b);
    // Remove positions that are too close to each other (< 30 chars apart)
    const filtered = [];
    for (const p of positions) {
      if (filtered.length === 0 || p - filtered[filtered.length - 1] >= 30) {
        filtered.push(p);
      }
    }

    if (filtered.length > 0) {
      let prev = 0;
      for (const pos of filtered) {
        const chunk = ref.substring(prev, pos).trim();
        if (chunk.length > 15) result.push(chunk);
        prev = pos;
      }
      const last = ref.substring(prev).trim();
      if (last.length > 15) result.push(last);
    } else {
      result.push(ref);
    }
  }
  // Final pass: merge orphan fragments that don't look like new reference entries
  // This catches journal continuation lines, stray page ranges, etc. that got split off
  if (result.length >= 2) {
    const final = [result[0]];
    for (let i = 1; i < result.length; i++) {
      if (looksLikeNewEntry(result[i])) {
        final.push(result[i]);
      } else {
        final[final.length - 1] += ' ' + result[i];
      }
    }
    return final;
  }
  return result;
}

function splitInlineRefs(txt) {
  // Find all positions where a reference likely starts (works for APA, Chicago, MLA, etc.)
  const starts = [];
  let m;

  // Pattern 1: APA-style — Surname, F. ... (Year)
  // Also matches lowercase particle surnames: "van Leeuwen, T." / "de Graaf, J."
  // The trailing initial allows extended-Latin caps (Ş, Ç, Ö, Ü, Ğ, İ, Á, É, etc.)
  // so refs like "Açıkalın, Ş. N." or "Çelik, Ç." are recognised at split boundaries.
  const apaRe = new RegExp(
    '(?:[A-Z\\u00C0-\\u024F][a-z\\u00C0-\\u024F]+(?:[-\'][A-Z]?[a-z\\u00C0-\\u024F]*)?|(?:' + LOWERCASE_PARTICLES + ')\\s+[A-Z\\u00C0-\\u024F][a-z\\u00C0-\\u024F]+(?:[-\'][A-Z]?[a-z\\u00C0-\\u024F]*)?),\\s+[A-Z\\u00C0-\\u024F]\\.',
    'g'
  );
  while ((m = apaRe.exec(txt)) !== null) {
    const pos = m.index;
    if (pos === 0) { starts.push(pos); continue; }
    const beforeWide = txt.substring(Math.max(0, pos - 10), pos);
    if (/[&]\s*$/.test(beforeWide) || /\band\s+$/i.test(beforeWide)) continue;
    // Guard against splitting at mid-list co-authors. Allow extended-Latin initials
    // (Ş., Ç., Ö., etc.) so refs with Turkish authors don't over-split.
    if (/[A-Z\u00C0-\u024F]\.,\s*$/.test(beforeWide)) continue;
    const before = txt.substring(Math.max(0, pos - 3), pos);
    if (/[.)\/\s]\s*$/.test(before)) {
      const after = txt.substring(pos, pos + 200);
      if (/\(\d{4}\)/.test(after)) {
        starts.push(pos);
      }
    }
  }

  // Pattern 2: Chicago/MLA-style — Surname, Firstname ... after DOI/URL/page-end/year-end
  // "Author, Firstname" preceded by DOI, URL, page range, or year+period
  const chicagoRe = /[A-Z\u00C0-\u024F][a-zA-Z\u00C0-\u024F''\u2019\-]{1,},\s+[A-Z][a-z\u00C0-\u024F]{1,}/g;
  while ((m = chicagoRe.exec(txt)) !== null) {
    const pos = m.index;
    if (pos === 0) { if (!starts.includes(pos)) starts.push(pos); continue; }
    if (starts.includes(pos)) continue;
    const beforeWide = txt.substring(Math.max(0, pos - 15), pos);
    // Skip co-authors
    if (/[&]\s*$/.test(beforeWide) || /\band\s+$/i.test(beforeWide)) continue;
    if (/,\s*$/.test(beforeWide) && /[A-Z]\.\s*,\s*$/.test(beforeWide)) continue;
    if (/et\s+al\.\s*$/.test(beforeWide)) continue;
    // Must be preceded by a strong boundary: DOI, URL, page range, or year+period
    const beforeChunk = txt.substring(Math.max(0, pos - 200), pos);
    const hasDOIorURL = /(doi[:.]10\.\S+|https?:\/\/\S+)\s*$/.test(beforeChunk);
    const hasPageEnd = /\d+[\u2013\u2014-]\d+\.\s*$/.test(beforeChunk);
    const hasYearEnd = /(?:,\s+|\.\s+)(?:19|20)\d{2}\.\s*$/.test(beforeChunk);
    const hasBracketEnd = /\]\s*$/.test(beforeChunk);
    if (hasDOIorURL || hasPageEnd || hasYearEnd || hasBracketEnd) {
      starts.push(pos);
    }
  }

  // Pattern 1b: ALL-CAPS surnames followed by initial — "SEFER AKTAŞ, A." or "ÖZÇELİK, H."
  // Used by Turkish and some Arabic transliteration journals where surnames are uppercased.
  // Allows 1-2 word surnames; trailing initial may be ASCII or extended-Latin.
  const allCapsRe = /[A-Z\u00C0-\u024F]{2,}(?:\s+[A-Z\u00C0-\u024F]{2,}){0,2},\s+[A-Z\u00C0-\u024F]\./g;
  while ((m = allCapsRe.exec(txt)) !== null) {
    const pos = m.index;
    if (starts.includes(pos)) continue;
    if (pos === 0) { starts.push(pos); continue; }
    const beforeWide = txt.substring(Math.max(0, pos - 10), pos);
    if (/[&]\s*$/.test(beforeWide) || /\band\s+$/i.test(beforeWide)) continue;
    if (/[A-Z\u00C0-\u024F]\.,\s*$/.test(beforeWide)) continue;
    const before = txt.substring(Math.max(0, pos - 3), pos);
    if (/[.)\/\s]\s*$/.test(before)) {
      const after = txt.substring(pos, pos + 250);
      if (/\(\d{4}\)/.test(after)) starts.push(pos);
    }
  }

  // Pattern 3: Organization abbreviations "HRW." "ICRC." "UN." followed by (Year)
  const orgRe = /[A-Z]{2,}\.\s*\(\d{4}\)/g;
  while ((m = orgRe.exec(txt)) !== null) {
    const pos = m.index;
    if (pos === 0 || /[.)\/\s]\s*$/.test(txt.substring(Math.max(0, pos - 3), pos))) {
      if (!starts.includes(pos)) starts.push(pos);
    }

  const orgMultiRe = /[A-Z\u00C0-\u024F][a-z\u00C0-\u024F]+(?:\s+(?:and|of|for|on|the)\s+[A-Z\u00C0-\u024F][a-z\u00C0-\u024F]+|\s+[A-Z\u00C0-\u024F][a-z\u00C0-\u024F]+){1,5}\.\s*\(\d{4}[a-z]?\)/g;

  // or a capital letter (unquoted book title).

    if (pos === 0) { starts.push(pos); continue; }
    const beforeWide = txt.substring(Math.max(0, pos - 15), pos);

    if (/,\s*$/.test(beforeWide)) continue;
    const before5 = txt.substring(Math.max(0, pos - 5), pos);

      }

    'g'
  );
  while ((m = oscolaOrgBookRe.exec(txt)) !== null) {
    const pos = m.index;
    if (starts.includes(pos)) continue;
    if (pos === 0) { starts.push(pos); continue; }
    const beforeWide = txt.substring(Math.max(0, pos - 15), pos);
    if (/\band\s+$/i.test(beforeWide)) continue;
    if (/,\s*$/.test(beforeWide)) continue;
    const before5 = txt.substring(Math.max(0, pos - 5), pos);

    if (/[\d)\]\.]\s*$/.test(before5)) {

    }

    }

  if (filtered.length < 2) return [txt].filter(r => r.trim().length > 15);

  const refs = [];
  for (let i = 0; i < filtered.length; i++) {
    const end = i < filtered.length - 1 ? filtered[i + 1] : txt.length;
    const ref = txt.substring(filtered[i], end).trim();
    if (ref.length > 15) refs.push(ref);

}

        const beforePart = text.substring(0, candidateIdx);
        if (/[A-Z\u00C0-\u024F][a-z\u00C0-\u024F]+[\s,]+[A-Z]\./.test(beforePart)) {
          bestSplitIdx = candidateIdx;
          break; // Take first valid split that's not another author name
        }
      }
      searchFrom = searchFrom + sm.index + sm[1].length + 1;
    }
    return bestSplitIdx;
  }

  // Handle non-APA format: "Surname I., Surname I. Title Words (Year). Volume(Issue) Journal Pages"
  if ((!r.title || r.title.length < 10) && yearM && r.authors && r.authors.length > 30) {
    const splitIdx = splitAuthorsTitle(r.authors, 15);
    if (splitIdx > 0) {
      r.title = r.authors.substring(splitIdx).trim().replace(/\.$/, '');
      r.authors = r.authors.substring(0, splitIdx).replace(/[,&\s]+$/, '').trim();
      r._nonApaFormat = true;
    }
  }

  // Handle "et al." in authors — title follows after "et al."
  // e.g. "Thomas C.D. et al. Extinction risk from climate change. Nature"
  if ((!r.title || r.title.length < 10) && r.authors && /\bet al\.?\b/i.test(r.authors)) {
    const etAlMatch = r.authors.match(/^(.+?\bet al\.?)\s*\.?\s+(.+)$/i);
    if (etAlMatch && etAlMatch[2].length > 10) {
      r.authors = etAlMatch[1].trim();
      let titleText = etAlMatch[2].trim();
      // Title may include journal name at end: "Title. Journal" → split and extract journal
      const lastDotSpace = titleText.lastIndexOf('. ');
      if (lastDotSpace > 5) {
        const possibleJournal = titleText.substring(lastDotSpace + 2).trim();
        // Accept as journal if short and capitalized (not a title continuation)
        if (possibleJournal.length < 60 && possibleJournal.length > 2 && /^[A-Z]/.test(possibleJournal)) {
          if (!r.journal) r.journal = possibleJournal.replace(/[.,]+$/, '');
          titleText = titleText.substring(0, lastDotSpace).trim();
        }
      }
      r.title = titleText.replace(/\.$/, '').trim();
    }
  }

  // Handle "and others" in authors when yearM exists (similar to et al.)
  if ((!r.title || r.title.length < 10) && yearM && r.authors && /\band others\b/i.test(r.authors)) {
    const othersMatch = r.authors.match(/^(.+?\band others\b\.?)\s+(.+)$/i);
    if (othersMatch && othersMatch[2].length > 10) {
      r.authors = othersMatch[1].trim();
      let titleText = othersMatch[2].trim();
      const lastDotSpace = titleText.lastIndexOf('. ');
      if (lastDotSpace > 5) {
        const possibleJournal = titleText.substring(lastDotSpace + 2).trim();
        if (possibleJournal.length < 60 && possibleJournal.length > 2 && /^[A-Z]/.test(possibleJournal)) {
          if (!r.journal) r.journal = possibleJournal.replace(/[.,]+$/, '');
          titleText = titleText.substring(0, lastDotSpace).trim();
        }
      }
      r.title = titleText.replace(/\.$/, '').trim();
    }
  }

  // For non-APA format, try to extract journal from after (Year): "421(6918) Nature 37–42"
  if (r._nonApaFormat && yearM && !r.journal) {
    const afterYear = ref.substring(ref.indexOf(yearM[0]) + yearM[0].length).replace(/^\s*[.)]\s*/, '').trim();
    // Pattern 1: "421(6918) Nature 37–42" → volume before journal
    const jm1 = afterYear.match(/^\d+\s*\(\d+\)\s+([A-Z][A-Za-z\s&]+?)[\s,]+\d/);
    if (jm1) {
      r.journal = jm1[1].trim();
    } else {
      // Pattern 2: "Nature, 421(6918), 37–42" or "Nature 421, 37-42"
      const jm2 = afterYear.match(/^([A-Z][A-Za-z\s&]+?)[\s,]+\d/);
      if (jm2 && jm2[1].length > 2) {
        r.journal = jm2[1].trim().replace(/,$/, '');
      }
    }
  }

  // Russian/legal citation format: "Surname I. I., Surname I. Title. City: Publisher Year. pp. X"
  // When yearM is null (bare year) and title/authors still empty
  if ((!r.title || r.title.length < 10) && !yearM && r.year) {
    const yearIdx = ref.indexOf(r.year);
    const beforeYear = ref.substring(0, yearIdx).trim();

    // Helper: strip publisher/city info from end of title text
    function stripPublisher(txt) {
      // ". City: Publisher" or ". Publisher Press/University" or ", ed by..."
      const pubRe = /^(.{10,}?)(?:\.\s+(?:[A-Z\u00C0-\u024F][a-z\u00C0-\u024F]+\s*:\s*|[A-Z\u00C0-\u024F].*?(?:University|Press|Publishers?|Publishing|Verlag|Kiad\u00F3|INFRA|Springer|Routledge|Elsevier|Cambridge|Oxford|Harvard|MIT|Wiley))|,\s*ed\s+by\b)/i;
      const m = txt.match(pubRe);
      if (m) return m[1].trim();
      const lastPeriod = txt.lastIndexOf('.');
      if (lastPeriod > 10) {
        const after = txt.substring(lastPeriod + 1).trim();
        if (/^[A-Z].*?(?:Press|Publish|Verlag|University|Springer|Routledge|INFRA|Cambridge|Oxford)/i.test(after) ||
            /^[A-Z][a-z]+:/.test(after)) {
          return txt.substring(0, lastPeriod).trim();
        }
      }
      return txt;
    }

    // Try "and others" pattern FIRST — most reliable signal for Russian format
    if (/\band others\b/i.test(beforeYear)) {
      const othersMatch = beforeYear.match(/^(.+?\band others\b\.?)\s+(.+)$/i);
      if (othersMatch && othersMatch[2].length > 10) {
        r.authors = othersMatch[1].trim();
        r.title = stripPublisher(othersMatch[2].trim()).replace(/\.$/, '').trim();
        r._nonApaFormat = true;
      }
    }
    // Try Russian "и др."
    if (!r.title && /\u0438\s+\u0434\u0440/i.test(beforeYear)) {
      const othersMatch = beforeYear.match(/^(.+?\u0438\s+\u0434\u0440\.?)\s+(.+)$/i);
      if (othersMatch && othersMatch[2].length > 10) {
        r.authors = othersMatch[1].trim();
        r.title = stripPublisher(othersMatch[2].trim()).replace(/\.$/, '').trim();
        r._nonApaFormat = true;
      }
    }
    // Then try initial-based author/title split
    if (!r.title || r.title.length < 10) {
      const splitIdx = splitAuthorsTitle(beforeYear, 10);
      if (splitIdx > 0) {
        let titleText = beforeYear.substring(splitIdx).trim();
        titleText = stripPublisher(titleText);
        r.title = titleText.replace(/\.$/, '').trim();
        r.authors = beforeYear.substring(0, splitIdx).replace(/[,&\s]+$/, '').trim();
        r._nonApaFormat = true;
      }
    }
  }

  // Fix authors when title was found via book-title fallback but authors still contains the title
  // e.g., authors="Bodansky D. The Art... Harvard" title="The Art..."
  if (r.title && r.authors && r.authors.length > r.title.length && r.authors.includes(r.title)) {
    const titleIdx = r.authors.indexOf(r.title);
    if (titleIdx > 3) {
      r.authors = r.authors.substring(0, titleIdx).replace(/[,&.\s]+$/, '').trim();
    }
  }

  // Russian citation format with // separator: "Author. Title // Journal. Year. Vol. pp."
  // The // clearly separates article title from journal info
  if (ref.includes(' // ')) {
    const dsi = ref.indexOf(' // ');
    const beforeSlash = ref.substring(0, dsi).trim();
    const afterSlash = ref.substring(dsi + 3).trim();
    // Extract year from after // if not found
    if (!r.year) {
      const ym = afterSlash.match(/\b((?:19|20)\d{2})\b/);
      if (ym) r.year = ym[1];
    }
    // Extract journal from after //: first part until year/volume/number
    if (!r.journal) {
      const jm = afterSlash.match(/^(.+?)(?:[\s.]+(?:19|20)\d{2}|[\s.]+Vol|[\s.]+No\.?\s*\d|[\s.]+\d{4}\b|\.\s+\d{1,3}[\s.(])/i);
      if (jm) r.journal = jm[1].trim().replace(/[.,]+$/, '');
      else r.journal = afterSlash.replace(/[.,\d\s]+$/, '').trim();
    }
    // If current title contains " // ", it's clearly wrong — it includes the journal separator
    // Clear it so we can extract properly from before //
    if (r.title && r.title.includes(' // ')) {
      r.title = '';
    }
    // Extract title from before //
    if (!r.title || r.title.length < 10) {
      const si = splitAuthorsTitle(beforeSlash, 5);
      if (si > 0) {
        r.title = beforeSlash.substring(si).trim().replace(/\.$/, '');
        r.authors = beforeSlash.substring(0, si).replace(/[,&.\s]+$/, '').trim();
      } else {
        // Fallback: if no initial-based split found, try simple first ". Sentence" split
        // e.g. "Craig R. Stationarity is dead" → author="Craig R.", title="Stationarity is dead"
        const simpleSplit = beforeSlash.match(/^(.+?[A-Z]\.)\s+([A-Z][a-z].{5,})$/);
        if (simpleSplit) {
          r.authors = simpleSplit[1].trim();
          r.title = simpleSplit[2].trim().replace(/\.$/, '');
        }
      }
    }
  }

  // Detect book chapter or conference proceedings (has "In ... (Ed" or "In Proceedings" or "In ... Conference")
  r.isBookChapter = /\bIn\s+[A-Z].*?\(Ed/.test(ref) || /\bIn\s+Proceedings\b/i.test(ref) || /\bIn\s+[A-Z].*?Conference\b/.test(ref);

  // Extract journal name (heuristic: after title, before volume/issue/pages/DOI markers)
  // Skip for book chapters — the "journal" field in CrossRef will be the book title, not comparable
  if (!r.journal && r.title && !r.isBookChapter) {
    const titleIdx = ref.indexOf(r.title);
    if (titleIdx >= 0) {
      let afterTitle = ref.substring(titleIdx + r.title.length);
      // Title may or may not include its trailing period. Normalise by trimming leading
      // whitespace / periods / commas / closing-quotes so afterClean starts with the journal
      // name (if any). Closing quotes are stripped because single-quoted-title Harvard variants
      // leave a stray `'` at the start of the post-title text.
      const afterClean = afterTitle.replace(/^[\s.,'\u2018\u2019\u201C\u201D]+/, '');
      // Journal name terminates at Vol/No/pp/volume(issue)/year/dash/semicolon/DOI, a comma
      // followed by a digit (vol num), or a period followed by a digit. This avoids picking
      // up "Vol" itself as the journal when the title-period was absorbed into the title.
      // Terminators require a digit / word boundary so that "Annual Review..." stops at
      // "Vol. 5" but NOT inside words like "volution" or "Notes". "Vol", "No", "pp" must
      // be followed by optional period and a digit; year/volume-issue patterns are plain.
      const jm = afterClean.match(
        /^([A-Z][A-Za-z\u00C0-\u024F\s&:'\-,()]*?[A-Za-z\u00C0-\u024F)])(?=\s*[,.]?\s*(?:[Vv]ol\.?\s*\d|[Nn]o\.?\s*\d|pp?\.\s*\d|\d+\s*\(\d+\)|(?:19|20)\d{2}\b|[\u2013\u2014\u2015]|\sDOI\b|doi[:.])|[,.]\s*\d|\s*$)/
      );
      if (jm) {
        let j = jm[1].trim().replace(/[.,;:]+$/, '').trim();
        // Reject obvious false positives — short generic markers that leaked through
        if (!/^(Vol|No|pp|vol|no|Issue|issue|P)\.?$/.test(j) && j.length >= 3) {
          r.journal = j;
        }
      }
      // Fallback to legacy "period + Capital word" extractor if no match
      if (!r.journal) {
        const legacy = afterTitle.match(/\.\s+([A-Z][^,\d]*?)(?:,\s*\d|\.\s*\d|\.\s*https?:\/\/|\.\s*$)/);
        if (legacy) {
          const j = legacy[1].trim().replace(/\.$/, '');
          if (!/^(Vol|No|pp|vol|no|Issue|issue|P)\.?$/.test(j) && j.length >= 3) {
            r.journal = j;
          }
        }
      }
    }
  }

  // Search query: full text without URLs/DOIs, normalize dashes for better API matching
  r.searchQuery = ref.replace(/https?:\/\/\S+/g, '').replace(/doi:\s*\S+/gi, '')
    .replace(/[\u2013\u2014]/g, '-')  // en-dash/em-dash → hyphen
    .trim().substring(0, 200);

  return r;
}

function shortLabel(parsed) {
  const auth = parsed.authors ? parsed.authors.split(',')[0].split('&')[0].trim() : '';
  const yr = parsed.year || '';
  const t = parsed.title ? parsed.title.substring(0, 40) : '';
  if (auth && yr) return `${auth} (${yr})`;
  if (t) return t + (t.length >= 40 ? '...' : '');
  return parsed.raw.substring(0, 50) + '...';
}

/* ============================================
   STRING MATCHING
   ============================================ */
function normalize(s) {
  if (!s) return '';
  return s.toLowerCase()
    .replace(/[\u2013\u2014\u2010\u2011]/g, '-')
    .replace(/[\u201C\u201D\u201E\u201F\u2018\u2019\u201A\u201B]/g, '')
    // Normalize Turkish special chars: ı→i, İ→i, ğ→g, ş→s, ç→c, ö→o, ü→u
    .replace(/\u0131/g, 'i')  // ı → i
    .replace(/\u011F/g, 'g')  // ğ → g
    .replace(/\u015F/g, 's')  // ş → s
    .replace(/\u00E7/g, 'c')  // ç → c
    .replace(/\u00F6/g, 'o')  // ö → o
    .replace(/\u00FC/g, 'u')  // ü → u
    .replace(/[^a-z0-9\s\u00C0-\u024F-]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function stripBrackets(s) {
  // Remove bracketed translations like [English translation] or (translated title)
  return s.replace(/\s*\[[^\]]*\]\s*/g, ' ').trim();
}

function calcJaccard(na, nb) {
  const wordsA = new Set(na.split(' ').filter(w => w.length > 2));
  const wordsB = new Set(nb.split(' ').filter(w => w.length > 2));
  if (wordsA.size === 0 || wordsB.size === 0) return 0;
  // Fuzzy word match: two words match if they're exact, or one is a prefix of the other (min 4 chars),
  // or they share 80%+ characters (handles "aesthetic"/"aesthetics", "construction"/"constructing")
  function fuzzyWordMatch(w1, w2) {
    if (w1 === w2) return true;
    if (w1.length >= 4 && w2.length >= 4) {
      const minLen = Math.min(w1.length, w2.length);
      const maxLen = Math.max(w1.length, w2.length);
      // Exact prefix match (shorter word is prefix of longer)
      if (w1.startsWith(w2.substring(0, minLen)) || w2.startsWith(w1.substring(0, minLen))) {
        if (minLen / maxLen >= 0.75) return true;
      }
      // Common prefix match: words share a long common prefix (same stem)
      // e.g. "definition"/"defining" share "defin" (5 chars), "migration"/"migrants" share "migra" (5 chars)
      let commonPrefix = 0;
      for (let i = 0; i < minLen; i++) {
        if (w1[i] === w2[i]) commonPrefix++;
        else break;
      }
      if (commonPrefix >= 5 && commonPrefix / minLen >= 0.6) return true;
    }
    return false;
  }
  // Count fuzzy intersections
  const matchedB = new Set();
  let intersection = 0;
  for (const wa of wordsA) {
    if (wordsB.has(wa)) { intersection++; matchedB.add(wa); continue; }
    for (const wb of wordsB) {
      if (!matchedB.has(wb) && fuzzyWordMatch(wa, wb)) { intersection++; matchedB.add(wb); break; }
    }
  }
  const union = wordsA.size + wordsB.size - intersection;
  const jaccard = intersection / union;

  // Substring containment check: if one normalized title is literally a substring of the other
  // (e.g. "competitive authoritarianism" inside "competitive authoritarianism hybrid regimes after the cold war")
  // This handles main title vs title+subtitle from CrossRef, but avoids false matches where
  // a short title like "imagined communities" matches "imagined communities reconsidered" (a review)
  if (na.length >= 10 && nb.length >= 10) {
    const shorter = na.length <= nb.length ? na : nb;
    const longer = na.length <= nb.length ? nb : na;
    const shorterWords = shorter.split(' ').filter(w => w.length > 2).length;
    // Only boost if: shorter title has 3+ significant words AND is at least 60% the length of the longer
    if (longer.includes(shorter) && shorterWords >= 3 && shorter.length / longer.length >= 0.6) {
      return Math.max(jaccard, 0.8);
    }
  }

  return jaccard;
}

function titleSimilarity(a, b) {
  if (!a || !b) return 0;
  // Strip edition markers before comparison so "(30th anniversary ed.)" doesn't penalize
  const stripEd = s => s
    .replace(/\s*\([\w\s]*(?:ed|edition|anniversary|commemorative|special|abridged|unabridged|reprint)\.?\)\s*/gi, ' ')
    .replace(/\s*\(\d+\w*\s+ed\.?\)\s*/gi, ' ')
    .trim();
  a = stripEd(a);
  b = stripEd(b);
  // Compare both with and without bracketed content, take the higher score
  const na = normalize(a), nb = normalize(b);
  if (na === nb) return 1;

  const sim1 = calcJaccard(na, nb);

  // Also try without brackets (handles [English translation] in non-English titles)
  const naClean = normalize(stripBrackets(a));
  const nbClean = normalize(stripBrackets(b));
  const sim2 = calcJaccard(naClean, nbClean);

  let best = Math.max(sim1, sim2);

  // Subtitle-aware comparison: if one title has a subtitle (after : or .)
  // and the other doesn't, compare main title parts only
  // e.g. "White But Not Quite: Central Europe's Illiberal Revolt" vs "White but Not Quite"
  // Must split on the ORIGINAL (pre-normalize) strings since normalize strips ':'
  if (best < 0.7) {
    const mainPartA = normalize((a || '').split(/\s*[:]\s/)[0]);
    const mainPartB = normalize((b || '').split(/\s*[:]\s/)[0]);
    if (mainPartA !== na || mainPartB !== nb) {
      const mainSim = calcJaccard(mainPartA, mainPartB);
      if (mainSim >= 0.8) best = Math.max(best, mainSim * 0.85);
    }
  }

  return best;
}

// Format CrossRef author list ("Family, Given; Family, Given; ...") as an
// APA-style citation fragment ("Family, G., Family, G., & Family, G.").
// Used to surface the journal/CrossRef-indexed citation form as a warning
// suggestion when the reference and CrossRef disagree on author name order.
function formatCrossRefAuthorsAPA(doiAuthors, maxAuthors) {
  if (!doiAuthors) return '';
  const limit = maxAuthors || 6;
  const parts = doiAuthors.split(';').map(s => s.trim()).filter(Boolean);
  const total = parts.length;
  const useParts = total > limit ? parts.slice(0, limit) : parts;
  const formatted = useParts.map(p => {
    if (p.includes(',')) {
      const [family, given] = p.split(',').map(s => s.trim());
      if (!given) return family;
      const initials = given.split(/[\s\-]+/).filter(Boolean)
        .map(w => w.charAt(0).toUpperCase() + '.').join(' ');
      return family + ', ' + initials;
    }
    // No comma — treat last word as surname, rest as given names
    const ws = p.split(/\s+/).filter(Boolean);
    if (ws.length < 2) return p;
    const family = ws[ws.length - 1];
    const initials = ws.slice(0, -1).map(w => w.charAt(0).toUpperCase() + '.').join(' ');
    return family + ', ' + initials;
  });
  if (formatted.length === 0) return '';
  let out;
  if (formatted.length === 1) out = formatted[0];
  else if (formatted.length === 2) out = formatted[0] + ', & ' + formatted[1];
  else out = formatted.slice(0, -1).join(', ') + ', & ' + formatted[formatted.length - 1];
  if (total > limit) out += ', et al.';
  return out;
}

function firstAuthorMatch(refAuthors, foundAuthors) {
  if (!refAuthors || !foundAuthors) return null; // can't compare
  // Normalize transliteration variants (Russian/Cyrillic names)
  const normTranslit = s => s
    .replace(/skiy\b/g, 'sky').replace(/skaia\b/g, 'skaya')
    .replace(/iya\b/g, 'ia').replace(/iya\b/g, 'ia')
    .replace(/yi\b/g, 'y').replace(/ii\b/g, 'y')
    .replace(/yu\b/g, 'iu').replace(/ya\b/g, 'ia')
    .replace(/kh/g, 'h').replace(/sh/g, 'sh')
    .replace(/sch/g, 'sh').replace(/tch/g, 'ch')
    .replace(/ov\b/g, 'ov').replace(/ev\b/g, 'ev');
  // Stop-words that must never be counted as surname candidates. These bubble up from
  // OSCOLA author lists ("and others", "et al"), from generic connectives, and from
  // org-name noise. Without this filter, "He B and others" would yield {"and","others"}
  // and match nothing — even though "He" IS the correct surname.
  const STOP = new Set([
    'and','others','et','al','the','for','with','from','van','von','de','di','la','le',
    'der','den','des','du','da','do','del','della','jr','sr','ii','iii','iv','ed','eds'
  ]);
  // Extract surname candidates from the first author. Keep 2+ char words (so short
  // surnames like "He", "Li", "Wu", "Yu", "Xu", "Ng", "Oh" are retained) but drop
  // single letters (which are initials), stop-words, and pure-digit tokens.
  const extractWords = s => {
    const first = normalize(s).split(/[;&]/)[0].trim();
    // Strip OSCOLA "and others" / "et al" tail before tokenizing
    const cleaned = first.replace(/\s+(?:and\s+others|et\s+al\.?)\s*$/i, '');
    return new Set(
      cleaned.split(/[\s,]+/)
        .map(w => w.replace(/\.$/, '')) // drop trailing period on initials like "J."
        .filter(w => w.length >= 2 && !/^\d+$/.test(w) && !STOP.has(w))
        .map(normTranslit)
    );
  };
  const wordsA = extractWords(refAuthors);
  const wordsB = extractWords(foundAuthors);
  if (wordsA.size === 0 || wordsB.size === 0) return null;
  // Check if there's any common word (surname) between the two name forms
  const common = [...wordsA].filter(w => wordsB.has(w));
  if (common.length > 0) return true;
  // Fuzzy surname match: check if any pair of words are 80%+ similar
  for (const wa of wordsA) {
    for (const wb of wordsB) {
      const minLen = Math.min(wa.length, wb.length);
      const maxLen = Math.max(wa.length, wb.length);
      if (minLen >= 4 && minLen / maxLen >= 0.75) {
        if (wa.startsWith(wb.substring(0, minLen)) || wb.startsWith(wa.substring(0, minLen))) return true;
      }
    }
  }
  return false;
}

function findBestMatch(parsed, candidates) {
  if (!candidates || candidates.length === 0) return null;
  let best = null, bestScore = 0;

  for (const c of candidates) {
    let score = 0;
    const tSim = titleSimilarity(parsed.title, c.title);
    score += tSim * 4; // title is most important
    if (parsed.year && c.year && String(parsed.year) === String(c.year)) score += 1;
    const am = firstAuthorMatch(parsed.authors, c.authors);
    if (am === true) score += 1;
    if (am === false) score -= 0.5;

    if (score > bestScore) {
      bestScore = score;
      best = { ...c, _score: score, _titleSim: tSim, _authorMatch: am };
    }
  }

  // Need at least ~45% title match, but if first author explicitly doesn't match,
  // require higher title similarity to avoid false positives from unrelated articles
  if (!best) return null;
  if (best._titleSim < 0.45) return null;
  if (best._authorMatch === false && best._titleSim < 0.7) return null;
  return best;
}

/* ============================================
   API CALLS
   ============================================ */
const delay = ms => new Promise(r => setTimeout(r, ms));

async function checkDOI(doi) {
  try {
    // DOIs are case-insensitive per specification — always query lowercase
    doi = doi.toLowerCase();
    const r = await fetch(`${CROSSREF_API}/works/${encodeURIComponent(doi)}?mailto=${MAILTO}`, {
      signal: AbortSignal.timeout(10000)
    });
    if (!r.ok) return { found: false, doi };
    const d = await r.json();
    const w = d.message;
    const stripHtml = s => s.replace(/<[^>]+>/g, '').replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"').trim();
    return {
      found: true, doi,
      title: stripHtml((w.title || [])[0] || ''),
      authors: (w.author || []).map(a => [a.family, a.given].filter(Boolean).join(', ')).join('; '),
      journal: stripHtml((w['container-title'] || [])[0] || ''),
