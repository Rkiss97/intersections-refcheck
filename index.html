// arXiv returns Atom XML, not JSON — we parse it manually
function _parseArxivEntry(entryXml) {
  const get = (tag) => {
    const m = entryXml.match(new RegExp('<' + tag + '[^>]*>([\\s\\S]*?)</' + tag + '>'));
    return m ? m[1].replace(/\s+/g, ' ').trim() : '';
  };
  const title = get('title').replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>');
  const published = get('published');
  const year = published ? published.substring(0, 4) : '';
  // Authors: multiple <author><name>...</name></author> blocks
  const authorNames = [];
  const authorRe = /<author[^>]*>[\s\S]*?<name[^>]*>([\s\S]*?)<\/name>[\s\S]*?<\/author>/g;
  let am;
  while ((am = authorRe.exec(entryXml)) !== null) {
    authorNames.push(am[1].replace(/\s+/g, ' ').trim());
  }
  // arXiv id: <id>http://arxiv.org/abs/NNNN.NNNNN(vN)</id>
  const idRaw = get('id');
  const idM = idRaw.match(/abs\/(.+?)(?:v\d+)?$/);
  const arxivId = idM ? idM[1] : '';
  // DOI: may be present if the paper was published — <arxiv:doi>...</arxiv:doi>
  const doiM = entryXml.match(/<arxiv:doi[^>]*>([\s\S]*?)<\/arxiv:doi>/);
  const doi = doiM ? doiM[1].trim() : '';
  return {
    title: title,
    authors: authorNames.join('; '),
    year: year,
    journal: 'arXiv:' + arxivId,
    doi: doi,
    source: 'arxiv',
    _arxivId: arxivId
  };
}

async function searchArxivById(arxivId) {
  // Strategy A: official arXiv API (export.arxiv.org). Often blocked for file:// origin
  // because export.arxiv.org may not send CORS headers for "Origin: null".
  try {
    const url = `https://export.arxiv.org/api/query?id_list=${encodeURIComponent(arxivId)}`;
    const r = await fetch(url, { signal: AbortSignal.timeout(15000) });
    if (r.ok) {
      const xml = await r.text();
      // Allow attributes on <entry> (defensive — arXiv usually has none, but some feeds do)
      const entryMatch = xml.match(/<entry\b[^>]*>[\s\S]*?<\/entry>/);
      if (entryMatch) {
        const parsed = _parseArxivEntry(entryMatch[0]);
        // arXiv returns a placeholder "Error" entry for bad IDs — skip those
        if (parsed.title && !/^error\b/i.test(parsed.title)) {
          return [parsed];
        }
      }
    }
  } catch(e) {
    console.warn('arXiv export API failed for', arxivId, e && e.message);
  }
  // Strategy B: doi.org content negotiation via DataCite DOI
  // Since 2022, every arXiv paper has a DataCite DOI of the form 10.48550/arXiv.{id}.
  // doi.org resolves these with CORS enabled, so this works from file:// origin too.
  try {
    const doi = '10.48550/arXiv.' + arxivId;
    const r = await fetch('https://doi.org/' + doi, {
      headers: { 'Accept': 'application/vnd.citationstyles.csl+json' },
      signal: AbortSignal.timeout(10000)
    });
    if (r.ok) {
      const d = await r.json();
      const title = (d.title || '').replace(/<[^>]+>/g, '').trim();
      if (title) {
        const authors = (d.author || []).map(a => [a.family, a.given].filter(Boolean).join(', ')).join('; ');
        const year = d.issued?.['date-parts']?.[0]?.[0] || (d.created?.['date-parts']?.[0]?.[0]) || '';
        return [{
          title: title,
          authors: authors,
          year: year ? String(year) : '',
          journal: 'arXiv:' + arxivId,
          doi: doi,
          source: 'arxiv',
          _arxivId: arxivId,
          _viaDataCite: true
        }];
      }
    }
  } catch(e) {
    console.warn('DataCite arXiv fallback failed for', arxivId, e && e.message);
  }
  // Strategy C: Semantic Scholar direct arXiv ID lookup via ARXIV: prefix.
  // Last-resort — S2 has aggressive rate limits (429) for anonymous clients.
  try {
    const s2Url = `${S2_API}/paper/ARXIV:${encodeURIComponent(arxivId)}?fields=title,authors,year,venue,externalIds`;
    const s2r = await fetch(s2Url, { signal: AbortSignal.timeout(10000) });
    if (s2r.ok) {
      const d = await s2r.json();
      if (d && d.title) {
        return [{
          title: d.title,
          authors: (d.authors || []).map(a => a.name || '').join('; '),
          year: d.year ? String(d.year) : '',
          journal: d.venue || ('arXiv:' + arxivId),
          doi: (d.externalIds && d.externalIds.DOI) || '',
          source: 'arxiv',
          _arxivId: arxivId,
          _viaS2: true
        }];
      }
    }
  } catch(e) {
    console.warn('Semantic Scholar arXiv fallback failed for', arxivId, e && e.message);
  }
  return [];
}

async function searchArxiv(title, author) {
  try {
    if (!title || title.length < 10) return [];
    // arXiv search_query syntax: ti:"..."+AND+au:...
    // Using url-encoded quotes around title for phrase match
    let q = 'ti:' + encodeURIComponent('"' + title.substring(0, 120) + '"');
    if (author) {
      const surname = normalize(author).split(/[,;&]/)[0].trim().split(/\s+/).filter(w => w.length > 2)[0];
      if (surname) q += '+AND+au:' + encodeURIComponent(surname);
    }
    const url = `https://export.arxiv.org/api/query?search_query=${q}&max_results=5`;
    const r = await fetch(url, { signal: AbortSignal.timeout(15000) });
    if (!r.ok) return [];
    const xml = await r.text();
    const entries = xml.match(/<entry\b[^>]*>[\s\S]*?<\/entry>/g) || [];
    return entries.map(_parseArxivEntry).filter(e => e.title && !/^error\b/i.test(e.title));
  } catch(e) {
    console.warn('arXiv title search failed', e && e.message);
    return [];
  }
}

/* ============================================
   VERIFICATION LOGIC
   ============================================ */
// Determine the label for the container: "journal" for articles, "book" for book chapters, etc.
function containerLabel(parsed, record) {
  // Check CrossRef type field
  if (record && /book-chapter|book-section|monograph/i.test(record.type)) return 'book';
  // Check if reference text looks like a book chapter: "In ... (Ed(s).)"
  if (parsed && /\bIn\s+[A-Z].*?\(Eds?\.?\)/i.test(parsed.raw)) return 'book';
  // Check for publisher keywords without journal-like volume/issue
  if (parsed && /\b(Press|Publishers?|Publishing|Verlag|Kiadó|Palgrave|Springer|Routledge|Elgar)\b/i.test(parsed.raw)
      && !/\d+\(\d+\)/.test(parsed.raw)) return 'book';
  return 'journal';
}

async function verifyRef(parsed) {
  const result = { status: 'warn', ref: parsed.raw, parsed, notes: [], found: null };
  let doiFailed = false; // Track if a DOI was present but didn't resolve
  let doiMismatch = false; // DOI resolved but pointed to a different paper

  // Step 1: DOI verification
  if (parsed.doi) {
    const doiRes = await checkDOI(parsed.doi);
    await delay(REQ_DELAY);

    if (doiRes.found) {
      result.found = doiRes;
      let tSim = titleSimilarity(parsed.title, doiRes.title);
      // Fallback: if parsed title extraction failed or gave poor match,
      // check if the CrossRef title appears in the raw reference text
      if (tSim < 0.7 && doiRes.title && parsed.raw) {
        const rawSim = titleSimilarity(parsed.raw, doiRes.title);
        // Also check direct substring containment (case-insensitive)
        const normCR = normalize(doiRes.title);
        const normRaw = normalize(parsed.raw);
        const containsTitle = normCR.length >= 15 && normRaw.includes(normCR);
        if (containsTitle) tSim = Math.max(tSim, 0.95);
        else if (rawSim > tSim) tSim = Math.max(tSim, rawSim * 0.9);
        tSim = Math.min(tSim, 1.0);
      }
      const am = firstAuthorMatch(parsed.authors, doiRes.authors);
      const yearExact = !parsed.year || String(parsed.year) === String(doiRes.year);
      const yearClose = !parsed.year || Math.abs(parseInt(parsed.year) - parseInt(doiRes.year)) <= 1;

      // Check journal name match (skip for books — parsed.journal is the publisher, not a journal)
      const refIsBook = !parsed.journal || parsed.isBookChapter || /\b(Press|Publishers?|Publishing|Verlag|Kiadó|Routledge|Elgar|Springer|Wiley|Sage|Bloomsbury|Cambridge|Oxford)\b/i.test(parsed.raw);
      // Normalize known repository/preprint journal name variants before comparison
      const normJournal = j => {
        if (!j) return j;
        const lo = j.toLowerCase();
        if (lo.includes('ssrn') || lo.includes('social science research network')) return 'SSRN';
        if (lo.includes('arxiv')) return 'arXiv';
        if (lo.includes('repec') || lo.includes('research papers in economics')) return 'RePEc';
        if (lo.includes('nber') || lo.includes('national bureau of economic research')) return 'NBER';
        return j;
      };
      const normRefJ = normJournal(parsed.journal);
      const normDoiJ = normJournal(doiRes.journal);
      const journalSim = !refIsBook && normRefJ && normDoiJ ? (normRefJ === normDoiJ ? 1 : titleSimilarity(normRefJ, normDoiJ)) : 1;
      const journalMismatch = !refIsBook && parsed.journal && doiRes.journal && journalSim < 0.45;
      const journalDiffers = !refIsBook && parsed.journal && doiRes.journal && journalSim < 0.85 && journalSim >= 0.45;

      if (tSim >= 0.5 && yearClose && !journalMismatch && am === false) {
        // DOI resolves, title looks similar, but AUTHOR does not match
        if (tSim >= 0.85 && yearExact && !journalMismatch) {
          // Very high title match + year exact → DOI is correct, but author form is wrong.
          // This IS an error the editor needs to fix — but show WHAT to fix it to.
          result.status = 'error';
          result.notes.push('DOI verified, title/year/journal match, but author names are incorrect');
          result.notes.push('Reference: ' + (parsed.authors || '').substring(0, 120));
          result.notes.push('CrossRef / journal index: ' + (doiRes.authors || '').substring(0, 120));
          const suggested = formatCrossRefAuthorsAPA(doiRes.authors);
          if (suggested) {
            result.notes.push('Correct form (as indexed by CrossRef and the publisher): ' + suggested);
          }
          return result;
        } else {
          // Lower title similarity → likely a book review DOI — search for correct record
          result.notes.push('DOI resolves but first author does not match');
          result.notes.push('Reference author: ' + (parsed.authors || '').split(/[,;&]/)[0].trim());
          result.notes.push('DOI record author: ' + (doiRes.authors || '').split(';')[0].trim());
          if (doiRes.journal) result.notes.push('DOI points to: ' + doiRes.journal + ' (' + doiRes.year + ') \u2014 this may be a book review, not the book itself');
          doiFailed = true;
          doiMismatch = true;
        }
      } else if (tSim >= 0.5 && yearClose && !journalMismatch) {
        // DOI valid, title matches, year OK, journal OK, author OK
        result.status = 'ok';
        result.notes.push('DOI verified in CrossRef');
        const checks = [];
        if (tSim >= 0.7) checks.push('title match');
        else checks.push('title: partial match');
        if (am === true) checks.push('first author match');
        if (yearExact) checks.push('year match');
        else checks.push('year: ' + parsed.year + ' in ref / ' + doiRes.year + ' in CrossRef (online-first vs. print)');
        if (doiRes.journal) { const cl = containerLabel(parsed, doiRes); checks.push(cl + ': ' + doiRes.journal); }
        result.notes.push(checks.join(' / '));
        // Check if journal name differs (not mismatch-level, but not identical either)
        if (journalDiffers) {
          result.status = 'error';
          const cl = containerLabel(parsed, doiRes);
          result.notes.push(cl.charAt(0).toUpperCase() + cl.slice(1) + ' name differs: reference says "' + parsed.journal + '", CrossRef says "' + doiRes.journal + '"');
        }
        // Check if author name order may be wrong: the CrossRef surname should appear in the reference
        // e.g. ref says "NADJE A." but CrossRef says "Al-Ali, Nadje" — "Al-Ali" is the surname
        if (am === true && doiRes.authors && parsed.authors) {
          // Extract surname from CrossRef "Surname, Given" format — take the part before the comma
          const crFirstAuthor = (doiRes.authors || '').split(';')[0].trim();
          const crFamilyRaw = crFirstAuthor.includes(',')
            ? crFirstAuthor.split(',')[0].trim()
            : (crFirstAuthor.split(/\s+/).slice(-1)[0] || '');
          // Word-level match: CrossRef sometimes mis-parses names and packs a given name
          // into the surname field (e.g. family="Jane Osareme" where "Jane" is the given
          // name and "Osareme" is the real surname). If ANY significant word from the
          // CrossRef surname appears as a whole word in the reference's author list,
          // treat it as a match — the reference is probably correct even if it doesn't
          // literally contain CrossRef's full family string.
          const crSurnameWords = normalize(crFamilyRaw).split(/\s+/).filter(w => w.length > 2);
          const refWordSet = new Set(normalize(parsed.authors).split(/\s+/).filter(w => w.length > 2));
          const anyWordInRef = crSurnameWords.some(w => refWordSet.has(w));
          if (crSurnameWords.length > 0 && !anyWordInRef) {
            // Author name form in the reference does not match CrossRef / the publisher.
            // This IS an error (the editor should fix the reference), but surface the
            // publisher/CrossRef form as the suggested correction.
            result.status = 'error';
            result.notes.push('Author names do not match CrossRef / journal index');
            result.notes.push('Reference: ' + parsed.authors.substring(0, 120));
            result.notes.push('CrossRef / journal index: ' + (doiRes.authors || '').substring(0, 120));
            const suggested = formatCrossRefAuthorsAPA(doiRes.authors);
            if (suggested) {
              result.notes.push('Correct form (as indexed by CrossRef and the publisher): ' + suggested);
            }
            }
        }
        return result;
      } else if (tSim >= 0.5 && yearClose && journalMismatch && yearExact) {
        result.status = 'error';
        { const cl = containerLabel(parsed, doiRes);
        result.notes.push('DOI verified and title matches, but ' + cl + ' name is incorrect');
        result.notes.push('Reference says: ' + parsed.journal);
        result.notes.push('CrossRef record: ' + doiRes.journal); }
        return result;
      } else if (tSim >= 0.5 && yearClose && journalMismatch && !yearExact) {
        result.status = 'error';
        { const cl = containerLabel(parsed, doiRes); const clCap = cl.charAt(0).toUpperCase() + cl.slice(1);
        result.notes.push('DOI verified but ' + cl + ' name and year are incorrect');
        result.notes.push(clCap + ': reference says "' + parsed.journal + '", correct: "' + doiRes.journal + '"'); }
        result.notes.push('Year: reference says ' + parsed.year + ', CrossRef says ' + doiRes.year);
        return result;
      } else if (tSim >= 0.5 && !yearClose && refIsBook && am !== false) {
        result.status = 'ok';
        result.notes.push('DOI verified in CrossRef');
        const checks = [];
        checks.push('title match');
        if (am === true) checks.push('first author match');
        checks.push('year: ' + parsed.year + ' in ref / ' + doiRes.year + ' in CrossRef (print vs. eBook date)');
        result.notes.push(checks.join(' / '));
        return result;
      } else if (tSim >= 0.5 && !yearClose) {
        result.status = 'warn';
        result.notes.push('DOI verified but year differs significantly');
        result.notes.push('Year: reference says ' + parsed.year + ', CrossRef says ' + doiRes.year);
        if (doiRes.journal) { const cl = containerLabel(parsed, doiRes); result.notes.push(cl.charAt(0).toUpperCase() + cl.slice(1) + ': ' + doiRes.journal); }
        result.notes.push('Please verify the publication year');
        return result;
      } else if (am !== false && yearClose) {
        // DOI resolves, author+year match, but title doesn't match
        result.status = 'warn';
        result.notes.push('DOI verified in CrossRef');
        // Check if this is a book chapter referencing the whole book DOI
        const chapterWithBookDOI = parsed.isBookChapter && doiRes.type &&
          /book|edited|monograph/i.test(doiRes.type);
        const rawHasBookTitle = doiRes.title && parsed.raw &&
          normalize(parsed.raw).includes(normalize(doiRes.title));
        if (chapterWithBookDOI || rawHasBookTitle) {
          result.notes.push('Note: DOI points to the whole book, not this specific chapter');
          result.notes.push('The chapter itself may have a separate DOI');
        } else if (tSim < 0.2) {
          result.notes.push('Title in database may be in a different language');
        } else {
          result.notes.push('Title in CrossRef record differs from reference');
          if (parsed.title) result.notes.push('Reference title: ' + parsed.title);
          if (doiRes.title) result.notes.push('CrossRef title: ' + doiRes.title);
          result.notes.push('The paper may have been published with a revised title');
        }
        const checks = [];
        if (am === true) checks.push('first author match');
        if (yearExact) checks.push('year match');
        else checks.push('year: ' + parsed.year + ' in ref / ' + doiRes.year + ' in CrossRef');
        if (doiRes.journal) { const cl = containerLabel(parsed, doiRes); checks.push(cl + ': ' + doiRes.journal); }
        result.notes.push(checks.join(' / '));
        return result;
      } else {
        // DOI resolves but title AND author/year don't match — likely wrong DOI
        // Don't return yet — fall through to search for the correct record
        doiFailed = true;
        doiMismatch = true;
      }
    } else {
      // DOI not in CrossRef — try Semantic Scholar DOI lookup (covers SSRN, arXiv, etc.)
      try {
        const s2DoiUrl = `${S2_API}/paper/DOI:${encodeURIComponent(parsed.doi)}?fields=title,authors,year,venue,externalIds`;
        const s2DoiResp = await fetch(s2DoiUrl, { signal: AbortSignal.timeout(10000) });
        if (s2DoiResp.ok) {
          const s2d = await s2DoiResp.json();
          if (s2d && s2d.title) {
            const s2Title = s2d.title;
            const s2Authors = (s2d.authors || []).map(a => a.name || '').join('; ');
            const s2Year = s2d.year || '';
            const s2Journal = s2d.venue || '';
            const tSim = titleSimilarity(parsed.title, s2Title);
            const am = firstAuthorMatch(parsed.authors, s2Authors);
            const yearOk = !parsed.year || !s2Year || Math.abs(parseInt(parsed.year) - parseInt(s2Year)) <= 1;
            if (tSim >= 0.5 && (am !== false) && yearOk) {
              result.status = 'ok';
              result.found = { title: s2Title, authors: s2Authors, year: s2Year, journal: s2Journal, doi: parsed.doi, source: 'semantic-scholar' };
              result.notes.push('DOI verified in Semantic Scholar');
              const checks = [];
              if (tSim >= 0.7) checks.push('title match');
              if (am === true) checks.push('first author match');
              if (parsed.year && s2Year && parsed.year === String(s2Year)) checks.push('year match');
              if (s2Journal) checks.push('journal: ' + s2Journal);
              result.notes.push(checks.join(' / '));
              return result;
            } else {
              // DOI found in S2 but metadata doesn't match well — still note it
              result.found = { title: s2Title, authors: s2Authors, year: s2Year, journal: s2Journal, doi: parsed.doi, source: 'semantic-scholar' };
              result.notes.push('DOI found in Semantic Scholar but metadata has discrepancies');
            }
          }
        }
      } catch(e) { /* S2 lookup failed, continue */ }
      await delay(REQ_DELAY);

      // Fallback: doi.org content negotiation — works for ANY DOI regardless of registrar
      // Returns metadata as JSON (citeproc format) via Accept header
      if (!result.found || !result.notes.some(n => n.includes('verified'))) {
        try {
          const doiCnResp = await fetch('https://doi.org/' + parsed.doi, {
            headers: { 'Accept': 'application/vnd.citationstyles.csl+json' },
            signal: AbortSignal.timeout(10000)
          });
          if (doiCnResp.ok) {
            const cn = await doiCnResp.json();
            const cnTitle = (cn.title || '').replace(/<[^>]+>/g, '').trim();
            const cnAuthors = (cn.author || []).map(a => [a.family, a.given].filter(Boolean).join(', ')).join('; ');
            const cnYear = cn.issued?.['date-parts']?.[0]?.[0] || '';
            const cnJournal = cn['container-title'] || '';
            if (cnTitle) {
              const tSim = titleSimilarity(parsed.title, cnTitle);
              const am = firstAuthorMatch(parsed.authors, cnAuthors);
              const yearOk = !parsed.year || !cnYear || Math.abs(parseInt(parsed.year) - parseInt(cnYear)) <= 1;
              if (tSim >= 0.5 && am !== false && yearOk) {
                result.status = 'ok';
                result.found = { title: cnTitle, authors: cnAuthors, year: String(cnYear), journal: cnJournal, doi: parsed.doi, source: 'doi.org' };
                result.notes = ['DOI verified via doi.org (not indexed in CrossRef)'];
                const checks = [];
                checks.push('title match (' + Math.round(tSim * 100) + '%)');
                if (am === true) checks.push('first author match');
                if (parsed.year && cnYear && parsed.year === String(cnYear)) checks.push('year match');
                if (cnJournal) checks.push('journal: ' + cnJournal);
                result.notes.push(checks.join(' / '));
                return result;
              } else {
                // DOI resolves with metadata but doesn't match well
                result.found = { title: cnTitle, authors: cnAuthors, year: String(cnYear), journal: cnJournal, doi: parsed.doi, source: 'doi.org' };
                result.notes.push('DOI resolves at doi.org but metadata has discrepancies');
              }
            }
          }
        } catch(e) { /* doi.org content negotiation failed — continue */ }
      }

      doiFailed = true;
      if (!result.notes.some(n => n.includes('Semantic Scholar') || n.includes('doi.org'))) {
        result.notes.push('DOI ' + parsed.doi + ' not found in CrossRef');
      }
    }
  }

  // Step 1b: Direct arXiv ID lookup — if the reference cites an arXiv preprint,
  // we can verify it directly via the arXiv API (handles preprints that have no DOI)
  if (parsed.arxivId && !result.found) {
    const arxivRes = await searchArxivById(parsed.arxivId);
    await delay(REQ_DELAY);
    if (arxivRes && arxivRes.length > 0) {
      const ax = arxivRes[0];
      const tSim = titleSimilarity(parsed.title, ax.title);
      const am = firstAuthorMatch(parsed.authors, ax.authors);
      const yearOk = !parsed.year || !ax.year || Math.abs(parseInt(parsed.year) - parseInt(ax.year)) <= 1;
      if (tSim >= 0.5 && am !== false && yearOk) {
        result.status = 'ok';
        result.found = ax;
        result.notes.push('arXiv ID ' + parsed.arxivId + ' verified via arXiv');
        const checks = [];
        if (tSim >= 0.7) checks.push('title match');
        else checks.push('title: partial match (' + Math.round(tSim * 100) + '%)');
        if (am === true) checks.push('first author match');
        if (parsed.year && ax.year && parsed.year === String(ax.year)) checks.push('year match');
        checks.push('arXiv:' + parsed.arxivId);
        result.notes.push(checks.join(' / '));
        return result;
      } else if (ax.title) {
        // arXiv ID resolves but metadata differs — record it but keep searching
        result.found = ax;
        result.notes.push('arXiv ID ' + parsed.arxivId + ' resolves but metadata has discrepancies');
      }
    }
    // Note: we intentionally do NOT push a "not found on arXiv" note here. When the
    // arXiv lookup fails (e.g. because export.arxiv.org is unreachable from file://
    // origin due to CORS), we still want the remaining searches (OpenAlex, CrossRef,
    // etc.) to find the paper cleanly, without a misleading error note.
  }

  // Clean title for searching: strip edition markers, normalize dashes
  const cleanTitle = (parsed.title || '')
    .replace(/\s*\([\w\s]*(?:ed|edition|anniversary|commemorative|special|abridged|unabridged|reprint)\.?\)\s*/gi, ' ')
    .replace(/[\u2013\u2014]/g, '-')  // en-dash/em-dash → hyphen for API queries
    .trim();

  // Step 2: Search CrossRef (bibliographic + title) + OpenAlex in parallel
  // Using both query.bibliographic (full ref text) and query.title (clean title only)
  // because noisy reference text can cause query.bibliographic to miss well-known papers
  const [crResults, crTitleResults, oaResults] = await Promise.all([
    searchCrossRef(parsed.searchQuery, parsed.year),
    cleanTitle && cleanTitle.length >= 15 ? searchCrossRefByTitle(cleanTitle, parsed.year) : Promise.resolve([]),
    cleanTitle ? searchOpenAlex(cleanTitle) : Promise.resolve([])
  ]);
  await delay(REQ_DELAY);

  let allCandidates = [...crResults, ...crTitleResults, ...oaResults];
  let best = findBestMatch(parsed, allCandidates);

  // Step 3: If not found OR only poor match, try Semantic Scholar
  const bestIsWeak = best && best._titleSim < 0.65;
  if ((!best || bestIsWeak) && parsed.title) {
    const s2Results = await searchSemanticScholar(cleanTitle || parsed.title);
    await delay(REQ_DELAY);
    const s2Best = findBestMatch(parsed, s2Results || []);
    if (s2Best && (!best || s2Best._titleSim > best._titleSim)) best = s2Best;
  }

  // Step 4: Try book-specific sources (Open Library + Google Books)
  // Always try for book-like references (no journal field, or publisher keywords like "Press")
  // Also try when current best is from a review journal (not the actual book)
  const looksLikeBook = !parsed.journal || /\b(Press|Publishers?|Publishing|Verlag|Kiadó)\b/i.test(parsed.raw);
  const bestIsReview = best && best.journal && /\breview/i.test(best.journal);
  const needBookSearch = !best || best._titleSim < 0.65 || looksLikeBook || bestIsReview;
  if (needBookSearch && parsed.title) {
    const [olResults, gbResults] = await Promise.all([
      searchOpenLibrary(cleanTitle || parsed.title, parsed.authors),
      searchGoogleBooks(cleanTitle || parsed.title, parsed.authors)
    ]);
    await delay(REQ_DELAY);
    const bookCandidates = [...(olResults || []), ...(gbResults || [])];
    const bookBest = findBestMatch(parsed, bookCandidates);
    if (bookBest) {
      // Prefer book result over review journal result for book-like references
      const preferBook = looksLikeBook && bestIsReview && bookBest._titleSim >= 0.5;
      if (!best || bookBest._titleSim > best._titleSim || preferBook) {
        best = bookBest;
      }
    } else {
    }
  }

  // Step 5: Author-mismatch retry — when title matches well but wrong author found,
  // retry search with author surname + title to find the correct version of the work
  if (best && best._authorMatch === false && best._titleSim >= 0.8 && parsed.authors && parsed.title) {
    const surname = normalize(parsed.authors).split(/[,;&]/)[0].trim().split(/\s+/).filter(w => w.length > 2)[0];
    if (surname) {
      const authorQuery = surname + ' ' + (cleanTitle || parsed.title);
      const [crRetry, oaRetry, olRetry, gbRetry] = await Promise.all([
        searchCrossRef(authorQuery, parsed.year),
        searchOpenAlex(authorQuery),
        searchOpenLibrary(cleanTitle || parsed.title, parsed.authors),
        searchGoogleBooks(cleanTitle || parsed.title, parsed.authors)
      ]);
      await delay(REQ_DELAY);
      const retryCandidates = [...(crRetry || []), ...(oaRetry || []), ...(olRetry || []), ...(gbRetry || [])];
      const retryBest = findBestMatch(parsed, retryCandidates);
      if (retryBest && retryBest._authorMatch !== false && retryBest._titleSim >= 0.5) {
        best = retryBest; // Found the correct version with matching author
      }
    }
  }

  // If reference is a book but best result is from a review/short-form journal, discard it — it's a book review, not the book itself
  const isReviewSource = best && best.journal && /\b(review|affairs|choice|booklist)\b/i.test(best.journal);
  if (best && looksLikeBook && isReviewSource && best.source !== 'open-library' && best.source !== 'google-books') {
    best = null;
  }

  // Discard results that are clearly a different work:
  // - author doesn't match AND year is off by 3+ years, OR
  // - author doesn't match AND title similarity < 80% (different work on similar topic), OR
  // - author doesn't match AND title is short/generic (<=5 content words) AND year differs at all
  //   (short generic titles like "Cryptocurrency and Crime" or "Blockchain Security"
  //    are very prone to topical coincidence matches across unrelated papers)
  if (best && best._authorMatch === false) {
    const yearGap = parsed.year && best.year ? Math.abs(parseInt(parsed.year) - parseInt(best.year)) : 0;
    if (yearGap >= 3 || best._titleSim < 0.8) {
      best = null;
    } else if (parsed.title && yearGap >= 1) {
      const titleWordCount = parsed.title.trim()
        .split(/\s+/)
        .filter(w => w.length > 2 && !/^(and|the|for|with|from|into|over|about|after|before)$/i.test(w))
        .length;
      if (titleWordCount <= 5) best = null;
    }
  }

  // Discard results where the found title is a review/commentary about the referenced work
  // (e.g. 'Review for "Predictors of..."' when reference is 'Predictors of...')
  if (best && best.title && /^(Review\s+(for|of)|Commentary\s+on|Response\s+to|Erratum|Corrigendum)\b/i.test(best.title)) {
    best = null;
  }
  // Discard results that are likely book reviews: reference is a book (has publisher, no journal)
  // but found record is a journal article with a completely different first author
  // (e.g. Fabian book found as Hanson's review in American Ethnologist)
  if (best && best._authorMatch === false && best.journal) {
    const refIsBook = parsed.raw && /\b(Press|Publishers?|Publishing|Verlag|Kiadó)\b/i.test(parsed.raw)
      && !parsed.journal;
    if (refIsBook) best = null;
  }

  // Discard results for web sources (URL-only references without journal/volume)
  // where title is very short — high risk of false positive matches
  if (best && !parsed.doi && !parsed.journal && parsed.raw && /https?:\/\//.test(parsed.raw)) {
    // Web source: require higher title similarity threshold
    if (best._titleSim < 0.90) best = null;
  }

  // Step 6: Last-resort search — if still no match, try CrossRef with author surname + title
  // This catches cases where both query.bibliographic and query.title fail with noisy input
  if (!best && parsed.title && parsed.authors && cleanTitle) {
    const surname = normalize(parsed.authors).split(/[,;&]/)[0].trim().split(/\s+/).filter(w => w.length > 2)[0];
    if (surname && surname.length > 2) {
      const lastResortQuery = surname + ' ' + cleanTitle;
      const [lrCr, lrOa] = await Promise.all([
        searchCrossRef(lastResortQuery, parsed.year),
        searchOpenAlex(lastResortQuery)
      ]);
      await delay(REQ_DELAY);
      const lrCandidates = [...(lrCr || []), ...(lrOa || [])];
      const lrBest = findBestMatch(parsed, lrCandidates);
      if (lrBest && lrBest._titleSim >= 0.5) best = lrBest;

  // Step 7: arXiv title search — for preprints and CS/physics/math papers that may
  // only exist on arXiv (or whose published version has a different title)
  if (!best && cleanTitle && cleanTitle.length >= 15) {
    const arxivResults = await searchArxiv(cleanTitle, parsed.authors);
    await delay(REQ_DELAY);
    const arxivBest = findBestMatch(parsed, arxivResults || []);
    if (arxivBest && arxivBest._titleSim >= 0.65) best = arxivBest;
  }

  if (best) {
    result.found = best;
    const tSim = best._titleSim;
    const isBookSource = best.source === 'open-library' || best.source === 'google-books';
    const yearExact = !parsed.year || String(parsed.year) === String(best.year);
    const yearClose = !parsed.year || Math.abs(parseInt(parsed.year) - parseInt(best.year)) <= 1;
    // For books with multiple editions: check if reference year matches ANY known edition year
    const editionYears = best._editions || [];
    const yearMatchesEdition = parsed.year && editionYears.includes(parseInt(parsed.year));
    // For books, allow wider year tolerance (different editions have different years)
    const yearOk = yearClose || yearMatchesEdition || (isBookSource && tSim >= 0.8);
    const am = firstAuthorMatch(parsed.authors, best.authors);

    if (tSim >= 0.65 && yearOk && am !== false) {
      if (doiFailed) {
        // Check if the found DOI is actually the same as the reference DOI (case-insensitive)
        // This means the DOI is correct but the journal is simply not indexed in CrossRef
        const normDoi = d => d ? d.toLowerCase().replace(/[\u2013\u2014]/g, '-') : '';
        const sameDoiCaseInsensitive = parsed.doi && best.doi && normDoi(parsed.doi) === normDoi(best.doi);
        if (sameDoiCaseInsensitive) {
          // DOI is correct — journal just not in CrossRef
          result.status = 'ok';
          result.notes = []; // Clear "DOI not found in CrossRef" note
          result.notes.push('Article confirmed via ' + sourceLabel(best.source));
        } else {
          // Article found but DOI is broken — check if journal also differs
          // Skip journal comparison for books (parsed.journal is actually the publisher, not a journal)
          // Also skip if found source is a repository/archive (not the actual journal)
          const foundIsRepo = best.journal && /\b(archive|repository|repozit|universit|electron|digital|preprint|ssrn|arxiv|hal)\b/i.test(best.journal);
          const journalAlsoDiffers = !looksLikeBook && !foundIsRepo && parsed.journal && best.journal && titleSimilarity(parsed.journal, best.journal) < 0.45;
          if (journalAlsoDiffers) {
            const cl = containerLabel(parsed, best);
            const clCap = cl.charAt(0).toUpperCase() + cl.slice(1);
            result.status = 'error';
            if (doiMismatch) {
              result.notes.push('DOI in reference points to a different paper and ' + cl + ' name is also incorrect');
              result.notes.push(clCap + ': reference says "' + parsed.journal + '", found: "' + best.journal + '"');
            } else {
              result.notes.push('DOI is invalid and ' + cl + ' name is incorrect');
              result.notes.push('DOI ' + parsed.doi + ' does not resolve');
              result.notes.push(clCap + ': reference says "' + parsed.journal + '", found: "' + best.journal + '"');
            }
            result.notes.push('Article may exist but reference has multiple errors');
          } else {
            result.status = 'error';
            if (doiMismatch) {
              result.notes.push('DOI in reference points to a different paper');
              result.notes.push('Correct record found via ' + sourceLabel(best.source));
            } else {
              result.notes.push('Article found via ' + sourceLabel(best.source) + ', but DOI in reference is invalid');
              result.notes.push('The DOI ' + parsed.doi + ' does not resolve \u2014 please fix the DOI');
            }
          }
        }
        const checks = [];
        checks.push('title match (' + Math.round(tSim * 100) + '%)');
        if (am === true) checks.push('first author match');
        if (best.journal) { const cl = containerLabel(parsed, best); checks.push(cl + ': ' + best.journal); }
        result.notes.push(checks.join(' / '));
      } else {
        result.status = 'ok';
        result.notes.push('Found matching record via ' + sourceLabel(best.source));
        const checks = [];
        checks.push('title match (' + Math.round(tSim * 100) + '%)');
        if (am === true) checks.push('first author match');
        if (yearExact && parsed.year) checks.push('year match');
        else if (!yearExact && parsed.year && yearClose) checks.push('year: ' + parsed.year + ' in ref / ' + best.year + ' in database (online-first vs. print)');
        else if (!yearExact && parsed.year) checks.push('year: ' + parsed.year + ' in ref / ' + best.year + ' in database (different edition)');
        if (best.journal) { const cl = containerLabel(parsed, best); checks.push(cl + ': ' + best.journal); }
        result.notes.push(checks.join(' / '));
      }
    } else if (tSim >= 0.65 && am === true && !yearOk) {
      if (doiFailed) {
        result.status = 'error';
        result.notes.push('Article found via ' + sourceLabel(best.source) + ', but DOI in reference is invalid');
        result.notes.push('The DOI ' + parsed.doi + ' does not resolve \u2014 please fix the DOI');
      } else {
        result.status = 'ok';
        result.notes.push('Found matching record via ' + sourceLabel(best.source));
      }
      result.notes.push('title match (' + Math.round(tSim * 100) + '%) / first author match / year: ' + parsed.year + ' in ref, ' + best.year + ' found (different edition)');
    } else {
      // If DOI failed in CrossRef but we only found a weak search match, check if DOI resolves at doi.org
      // A resolving DOI is stronger evidence than a weak database match
      if (doiFailed && parsed.doi && tSim < 0.65) {
        try {
          const doiHeadResp = await fetch('https://doi.org/api/handles/' + encodeURIComponent(parsed.doi), {
            signal: AbortSignal.timeout(8000)
          });
          const doiHeadData = doiHeadResp.ok ? await doiHeadResp.json() : null;
          if (doiHeadData && doiHeadData.responseCode === 1) {
            result.status = 'ok';
            result.notes.push('DOI verified \u2014 resolves at doi.org (journal not indexed in CrossRef)');
            result.notes.push('Manual verification recommended for bibliographic details');
            return result;
          }
        } catch(e) { /* network error — fall through to weak match reporting */ }
      }
      // When author doesn't match, require very high title similarity (>= 0.92) to show as "similar"
      // Lower similarity with wrong author usually means a different work with overlapping topic words
      // e.g. "Biodiversity Law and Climate Adaptation" vs "Climate change adaptation and biodiversity law"
      if (am === false && tSim < 0.92) {
        // Don't show this misleading match — treat as not found
        best = null;
        result.found = null;
      }
      // Additional suppression: if the year gap is large OR the title similarity is weak,
      // this is almost certainly an unrelated keyword-overlap match (e.g. a 2024 Reuters news
      // article mis-matched to a 1994 book about Costa Rica). Jaccard on short titles can easily
      // produce 0.6-0.8 for topically unrelated items sharing a few common words, so we must be
      // aggressive when the year is off and/or the author didn't clearly match.
      if (best && parsed.year && best.year) {
        const yearDiff = Math.abs(parseInt(parsed.year, 10) - parseInt(best.year, 10));
        // Big year gap + not a clear author match is always suspicious
        if (yearDiff > 10 && am !== true) {
          best = null;
          result.found = null;
        }
        // Moderate year gap + weak title similarity
        else if (yearDiff > 5 && tSim < 0.8) {
          best = null;
          result.found = null;
        }
        // Very large year gap + less than near-perfect title match
        else if (yearDiff > 20 && tSim < 0.95) {
          best = null;
          result.found = null;
        }
      }
      // Also: if author couldn't be matched (am === null, e.g. org/Reuters authors)
      // and title similarity is mediocre, suppress — we have no anchor to trust.
      if (best && am !== true && tSim < 0.8) {
        best = null;
        result.found = null;
      }
      if (best) {
        result.status = 'warn';
        // When author and year match but title is low, likely a shortened/abbreviated title in reference
        if (tSim < 0.65 && am === true && yearOk) {
          result.notes.push('Possible match found via ' + sourceLabel(best.source) + ' \u2014 reference may use shortened title');
          result.notes.push('Title similarity: ' + Math.round(tSim * 100) + '%');
          if (parsed.title) result.notes.push('Reference title: "' + parsed.title + '"');
          if (best.title) result.notes.push('Database title: "' + best.title + '"');
          result.notes.push('First author and year match \u2014 likely the same work');
        } else {
          result.notes.push('Similar record found via ' + sourceLabel(best.source) + ' but with discrepancies');
          if (tSim < 0.65) {
            result.notes.push('Title similarity: ' + Math.round(tSim * 100) + '% \u2014 may be different work');
            if (parsed.title) result.notes.push('Reference title: ' + parsed.title);
            if (best.title) result.notes.push('Database title: ' + best.title);
          }
        }
        if (!yearOk && parsed.year) {
          let yearNote = 'Year: reference says ' + parsed.year + ', found ' + best.year;
          if (editionYears.length > 1) yearNote += ' (known editions: ' + editionYears.slice(0, 6).join(', ') + ')';
          result.notes.push(yearNote);
        } else if (!yearExact && parsed.year) {
          let yearNote = 'Year: ' + parsed.year + ' in ref / ' + best.year + ' in database';
          if (yearMatchesEdition) yearNote += ' (year matches a known edition)';
          else if (editionYears.length > 1) yearNote += ' (known editions: ' + editionYears.slice(0, 6).join(', ') + ')';
          result.notes.push(yearNote);
        }
        if (am === false) result.notes.push('First author does not match');
        result.notes.push('Manual verification recommended');
      }
    }
    // If best was nulled by misleading-match suppression, fall through to "not found" instead of returning
    if (!best) {
      // fall through to "not found" code below
    } else {
      return result;
    }
  }

  // Not found anywhere
  // But if we already have a found record from DOI lookup, don't say "fabricated"
  // The DOI resolved, so the paper exists — it's just the title/metadata comparison that failed
  if (result.found) {
    result.status = 'warn';
    if (parsed.doi) {
      result.notes.push('DOI resolves in CrossRef but metadata could not be fully matched');
      result.notes.push('This may be due to different language titles or metadata discrepancies');
    } else {
      result.notes.push('A similar record was found but could not be confidently matched');
    }
    result.notes.push('Manual verification recommended');
    return result;
  }
  const looksLikeBookFinal = /\b(Press|Publishers?|Publishing|Verlag|Kiad\u00F3|Books?)\b/i.test(parsed.raw);
  if (parsed.doi && !looksLikeBookFinal) {
    // Before declaring "fabricated", try a HEAD request to doi.org to see if DOI resolves at all
    try {
      // Use doi.org Handle API which is CORS-friendly (unlike doi.org redirects)
      const doiCheckResp = await fetch('https://doi.org/api/handles/' + encodeURIComponent(parsed.doi), {
        signal: AbortSignal.timeout(8000)
      });
      const doiCheckData = doiCheckResp.ok ? await doiCheckResp.json() : null;
      if (doiCheckData && doiCheckData.responseCode === 1) {
        // DOI resolves — it's just not in CrossRef
        result.status = 'warn';
        result.notes.push('DOI resolves at doi.org but is not registered in CrossRef');
        result.notes.push('The article exists but may be in a database not covered by this tool');
        result.notes.push('Manual verification recommended');
        return result;
      }
    } catch(e) { /* network error — fall through to fabricated */ }
    result.status = 'error';
    result.notes.push('DOI does not resolve and no matching record found in academic databases');
    result.notes.push('Reference may be fabricated');
  } else if (parsed.doi && looksLikeBookFinal) {
    result.status = 'warn';
    result.notes.push('DOI not found in CrossRef and book not matched in Open Library or Google Books');
    result.notes.push('The book may exist but is not well indexed \u2014 manual verification recommended');
  } else {
    result.status = 'warn';
    result.notes.push('No matching record found in any database (CrossRef, OpenAlex, Semantic Scholar, Open Library, Google Books, arXiv)');
    result.notes.push('This may be a book, report, newspaper/news article, or other non-indexed source \u2014 manual verification recommended');
  }
  return result;
}

function sourceLabel(src) {

    'crossref': 'CrossRef',
    'openalex': 'OpenAlex',
    'semantic-scholar': 'Semantic Scholar',
    'open-library': 'Open Library',
    'google-books': 'Google Books',
    'arxiv': 'arXiv'
  };
  return labels[src] || src;
}

/* ============================================
   DUPLICATE DETECTION
   ============================================ */
function detectDuplicates(results) {
  const n = results.length;
  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      const a = results[i], b = results[j];
      if (!a.parsed || !b.parsed) continue;

      let isDup = false;
      let reason = '';

      // Check 1: Same DOI
      if (a.parsed.doi && b.parsed.doi && a.parsed.doi === b.parsed.doi) {
        isDup = true;
        reason = 'same DOI as entry #' + (i + 1) + ' (' + shortLabel(a.parsed) + ')';
      }

      // Check 2: Same DOI found via verification — but only if both matches were confident
      if (!isDup && a.found?.doi && b.found?.doi && a.found.doi === b.found.doi && a.found.doi !== '') {
        const aConfident = a.found._titleSim >= 0.65 || a.found.source === 'crossref-doi' || a.found.source === 'doi.org';
        const bConfident = b.found._titleSim >= 0.65 || b.found.source === 'crossref-doi' || b.found.source === 'doi.org';
        if (aConfident && bConfident) {
          isDup = true;
          reason = 'resolves to same work as entry #' + (i + 1) + ' (' + shortLabel(a.parsed) + ')';
        }
      }

      // Check 3: Very similar titles + same first author
      if (!isDup && a.parsed.title && b.parsed.title) {
        const tSim = titleSimilarity(a.parsed.title, b.parsed.title);
        const sameAuthor = firstAuthorMatch(a.parsed.authors, b.parsed.authors);
        if (tSim >= 0.85 && sameAuthor === true) {
          isDup = true;
          reason = 'appears to be the same work as entry #' + (i + 1) + ' (' + shortLabel(a.parsed) + ')';
        }
      }

      if (isDup) {
        // Mark the second occurrence as a duplicate — always error
        b.status = 'error';
        b.notes.unshift('DUPLICATE: ' + reason);
      }
    }
  }
}

/* ============================================
   CONCURRENCY CONTROL
   ============================================ */
async function runConcurrent(tasks, limit) {
  const results = new Array(tasks.length);
  let idx = 0;
  async function worker() {
    while (idx < tasks.length) {
      const i = idx++;
      results[i] = await tasks[i](i);
    }
  }
  const workers = Array.from({ length: Math.min(limit, tasks.length) }, () => worker());
  await Promise.all(workers);
  return results;
}

/* ============================================
   MAIN FLOW
   ============================================ */
let _running = false;
let _results = [];

async function go() {
  if (_running) return;
  const txt = document.getElementById('refIn').value.trim();
  if (!txt) { toast('Paste references first'); return; }

  _running = true;
  const refs = splitRefs(txt);
  const parsed = refs.map(parseRef);

  // UI setup
  document.getElementById('goBtn').disabled = true;
  document.getElementById('goBtn').textContent = 'Checking...';
  document.getElementById('progCard').classList.add('on');
  document.getElementById('resCard').classList.remove('on');
  document.getElementById('pbar').style.width = '0%';
  document.getElementById('ptxt').textContent = `Checking ${parsed.length} references...`;
  document.getElementById('plive').innerHTML = '';
  document.getElementById('progLabel').textContent = `Checking ${parsed.length} references...`;

  // Initialize live list
  const plive = document.getElementById('plive');
  parsed.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'plive-item pending';
    div.id = 'plive-' + i;
    div.innerHTML = `<span class="icon">\u00B7</span><span class="text">${esc(shortLabel(p))}</span>`;
    plive.appendChild(div);
  });

  let done = 0, ok = 0, warn = 0, err = 0;
  _results = [];

  const tasks = parsed.map((p, i) => async () => {
    // Mark as checking
    const li = document.getElementById('plive-' + i);
    if (li) {
      li.className = 'plive-item';
      li.querySelector('.icon').innerHTML = '<span class="dot" style="width:10px;height:10px;border-width:1.5px;display:inline-block;vertical-align:middle;"></span>';
    }

    const result = await verifyRef(p);
    _results[i] = result;
    done++;

    if (result.status === 'ok') ok++;
    else if (result.status === 'warn') warn++;
    else err++;

    // Update live item
    if (li) {
      const icon = result.status === 'ok' ? '\u2705' : result.status === 'warn' ? '\u26A0\uFE0F' : '\u274C';
      li.className = 'plive-item';
      li.querySelector('.icon').textContent = icon;
      // Auto-scroll
      plive.scrollTop = plive.scrollHeight;
    }

    // Update progress
    const pct = Math.round((done / parsed.length) * 100);
    document.getElementById('pbar').style.width = pct + '%';
    document.getElementById('ptxt').textContent = `${done}/${parsed.length} Checked \u2014 ${ok} Verified, ${warn} Uncertain, ${err} Errors`;
  });

  await runConcurrent(tasks, MAX_CONCURRENT);

  // Post-processing: detect duplicate references
  detectDuplicates(_results);

  // Show results
  document.getElementById('progCard').classList.remove('on');
  showResults(_results);

  _running = false;
  document.getElementById('goBtn').disabled = false;
  document.getElementById('goBtn').textContent = 'Check References';
}

/* ============================================
   RESULTS DISPLAY
   ============================================ */
function showResults(results) {
  const card = document.getElementById('resCard');
  card.classList.add('on');

  const ok = results.filter(r => r.status === 'ok').length;
  const warn = results.filter(r => r.status === 'warn').length;
  const err = results.filter(r => r.status === 'error').length;

  document.getElementById('sumRow').innerHTML = `
    <div class="pill p-all"><span class="n">${results.length}</span> Checked</div>
    <div class="pill p-ok"><span class="n">${ok}</span> Verified</div>
    <div class="pill p-warn"><span class="n">${warn}</span> Uncertain</div>
    <div class="pill p-err"><span class="n">${err}</span> Errors</div>`;

  renderEntries(results, 'all');

  // Build raw text grouped by status
  window._allResults = results;
  updateRawText('all');

  card.scrollIntoView({ behavior: 'smooth' });
}

function renderEntries(results, filter) {
  const body = document.getElementById('resBody');
  body.innerHTML = '';

  const list = filter === 'all' ? results : results.filter(r =>
    filter === 'ok' ? r.status === 'ok' :
    filter === 'warn' ? r.status === 'warn' :
    r.status === 'error'
  );

  if (!list.length) {
    body.innerHTML = '<p style="color:var(--brown-light);text-align:center;padding:40px;">No entries match this filter.</p>';
    return;
  }

  list.forEach(r => {
    const div = document.createElement('div');
    const cls = r.status === 'ok' ? 'e-ok' : r.status === 'warn' ? 'e-warn' : 'e-err';
    div.className = 'entry ' + cls;

    const icon = r.status === 'ok' ? '\u2705' : r.status === 'warn' ? '\u26A0\uFE0F' : '\u274C';

    let notesHtml = '';
    if (r.notes.length) {
      notesHtml = '<div class="ann">' + r.notes.map(n => {
        let cls = '';
        if (n.includes('match') && !n.includes('mismatch') && !n.includes('does not match')) cls = 'match';
        if (n.includes('mismatch') || n.includes('not found') || n.includes('fabricated') || n.includes('does not match') || n.includes('does not resolve')) cls = 'mismatch';
        if (n.startsWith('DUPLICATE:')) cls = 'mismatch';
        if (n.includes('via ') || n.includes('DOI verified')) cls = 'source';
        return `<div class="ann-line ${cls}">\u2192 ${esc(n)}</div>`;
      }).join('') + '</div>';
    }

    // Found record details (skip for duplicates — the DUPLICATE note is enough)
    let foundHtml = '';
    const isDuplicate = r.notes.some(n => n.startsWith('DUPLICATE:'));
    if (r.found && r.found.title && !isDuplicate) {
      const f = r.found;
      const isGoodMatch = f._titleSim >= 0.65 || r.status === 'ok' || f.source === 'crossref-doi';

      // Build full record details for all matches (good, moderate, or weak)
      let details = [];
      if (f.title) details.push('<strong>Title:</strong> ' + esc(f.title));
      if (f.authors) details.push('<strong>Authors:</strong> ' + esc(f.authors.substring(0, 120)));
      if (f.year) details.push('<strong>Year:</strong> ' + f.year);
      if (f.journal) {
        const cLabel = containerLabel(r.parsed, f);
        const cLabelCap = cLabel.charAt(0).toUpperCase() + cLabel.slice(1);
        details.push('<strong>' + cLabelCap + ':</strong> ' + esc(f.journal));
      }
      if (f.doi) {
        const refDoi = r.parsed?.doi?.toLowerCase() || '';
        const foundDoi = f.doi.toLowerCase();
        if (refDoi && refDoi === foundDoi) {
          // Same DOI — show as confirmed link
          details.push(`<a href="https://doi.org/${esc(f.doi)}" target="_blank" rel="noopener">doi:${esc(f.doi)}</a>`);
        } else if (refDoi && refDoi !== foundDoi) {
          // Reference has a different DOI — show the database DOI for comparison
          details.push(`<strong>DOI in database:</strong> <a href="https://doi.org/${esc(f.doi)}" target="_blank" rel="noopener">${esc(f.doi)}</a>`);
        }
        // If reference has NO DOI, don't show the found DOI — it may point to a different chapter/version
      }
      if (details.length > 0) {
        const opacity = isGoodMatch ? '' : ' style="opacity:0.85;"';
        const label = isGoodMatch ? '' : '<strong>Closest match:</strong> ';
        foundHtml = '<div class="found-record"' + opacity + '>' + label + details.join(' &middot; ') + '</div>';
      }
    }

    div.innerHTML = `<div class="ref">${icon} ${esc(r.ref)}</div>${notesHtml}${foundHtml}`;
    body.appendChild(div);
  });
}

/* ============================================
   UI HELPERS
   ============================================ */
function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function toast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('on'); setTimeout(() => t.classList.remove('on'), 2200); }
function clr() {
  document.getElementById('refIn').value = '';
  uc();
  // Reset everything to initial state
  _results = [];
  document.getElementById('resCard').classList.remove('on');
  document.getElementById('progCard').classList.remove('on');
  document.getElementById('resBody').innerHTML = '';
  document.getElementById('resBody').style.display = '';
  document.getElementById('sumRow').innerHTML = '';
  document.getElementById('rawBox').innerHTML = '';
  document.getElementById('rawWrap').classList.remove('on');
  document.getElementById('rawBtn').classList.remove('active');
  _currentFilter = 'all';
  document.querySelectorAll('.fp').forEach((x, i) => x.classList.toggle('on', i === 0));
}

function uc() {
  const t = document.getElementById('refIn').value;
  const refs = splitRefs(t);
  document.getElementById('hint').textContent = refs.length > 0 ? refs.length + ' references detected' : '';
  document.getElementById('goBtn').disabled = !t.trim();
}

let _currentFilter = 'all';
function filt(f, btn) {
  document.querySelectorAll('.fp').forEach(x => x.classList.remove('on'));
  if (btn) btn.classList.add('on');
  _currentFilter = f;
  if (_results.length) renderEntries(_results, f);
  updateRawText(f);
  // If Raw is open, keep card list hidden
  const rawOpen = document.getElementById('rawWrap').classList.contains('on');
  document.getElementById('resBody').style.display = rawOpen ? 'none' : '';
}

function updateRawText(filter) {
  const results = window._allResults || _results;
  if (!results.length) return;

  function buildBlock(list) {
    return list.map(r => r.ref).join('\n\n');
  }

  let rawText;
  if (filter === 'all') {
    const errs = results.filter(r => r.status === 'error');
    const warns = results.filter(r => r.status === 'warn');
    const oks = results.filter(r => r.status === 'ok');
    const sections = [];
    if (errs.length) sections.push('=== ERRORS (' + errs.length + ') ===\n\n' + buildBlock(errs));
    if (warns.length) sections.push('=== UNCERTAIN (' + warns.length + ') ===\n\n' + buildBlock(warns));
    if (oks.length) sections.push('=== VERIFIED (' + oks.length + ') ===\n\n' + buildBlock(oks));
    rawText = sections.join('\n\n\n');
  } else {
    const filtered = results.filter(r =>
      filter === 'ok' ? r.status === 'ok' :
      filter === 'warn' ? r.status === 'warn' :
      r.status === 'error'
    );
    rawText = buildBlock(filtered);
  }
  document.getElementById('rawBox').textContent = rawText;
}

function toggleRaw() {
  const wrap = document.getElementById('rawWrap');
  const body = document.getElementById('resBody');
  const btn = document.getElementById('rawBtn');
  const isOpen = wrap.classList.toggle('on');
  body.style.display = isOpen ? 'none' : '';
  btn.classList.toggle('active', isOpen);
  // Always refresh raw content for current filter
  updateRawText(_currentFilter);
}
function copyRaw() {
  navigator.clipboard.writeText(document.getElementById('rawBox').textContent)
    .then(() => toast('Copied to clipboard'));
}

function copyRes() {
  navigator.clipboard.writeText(document.getElementById('rawBox').textContent)
    .then(() => toast('Copied to clipboard'));
}

function exp() {
  // Always export full grouped list regardless of current filter
  updateRawText('all');
  const text = document.getElementById('rawBox').textContent;
  // Restore current filter view
  updateRawText(_currentFilter);
  const blob = new Blob([text], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `reference-check-${new Date().toISOString().slice(0, 10)}.md`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Exported');
}
